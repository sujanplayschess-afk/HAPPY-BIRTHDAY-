<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — For Her</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#09080f;
      --surface:#111019;
      --surface2:#161524;
      --border:rgba(255,255,255,0.07);
      --gold:#e8a96a;
      --gold-dim:rgba(232,169,106,0.12);
      --gold-border:rgba(232,169,106,0.22);
      --white:#f0e8da;
      --dim:rgba(240,232,218,0.42);
      --dim2:rgba(240,232,218,0.22);
      --danger:#c45c5c;
      --success:#5aac7e;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 36px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(9, 8, 15, 0.95);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .logo { display: flex; align-items: center; gap: 14px; }
    .logo-icon {
      width: 30px;
      height: 30px;
      border: 1px solid var(--gold-border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-icon::after {
      content: '';
      width: 0;
      height: 0;
      border-left: 8px solid var(--gold);
      border-top: 4.5px solid transparent;
      border-bottom: 4.5px solid transparent;
      margin-left: 2px;
    }
    .logo-text {
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--dim);
    }
    .logo-text strong { color: var(--white); font-weight: 400; }

    .header-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(90, 172, 126, 0.12);
      border: 1px solid rgba(90, 172, 126, 0.25);
      border-radius: 20px;
      font-size: 9px;
      color: var(--success);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .status-badge.offline {
      background: rgba(196, 92, 92, 0.12);
      border-color: rgba(196, 92, 92, 0.25);
      color: var(--danger);
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }
    .status-dot.offline {
      background: var(--danger);
      animation: none;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .btn {
      padding: 9px 22px;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.3s;
      line-height: 1;
    }
    .btn-primary { background: var(--gold); color: #09080f; font-weight: 500; }
    .btn-primary:hover { filter: brightness(1.08); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--dim); }
    .btn-ghost:hover { border-color: var(--gold-border); color: var(--gold); }
    .btn-danger { background: transparent; border: 1px solid rgba(196, 92, 92, 0.25); color: var(--danger); padding: 6px 14px; font-size: 9px; }
    .btn-danger:hover { background: rgba(196, 92, 92, 0.08); }

    main { max-width: 1180px; margin: 0 auto; padding: 36px 28px; }

    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 36px;
      gap: 2px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 12px 24px;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--dim2);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.3s;
      background: none;
      border: none;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
    }
    .tab:hover { color: var(--dim); }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .device-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .device-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .device-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      background: var(--surface2);
      border-radius: 2px;
      border: 1px solid var(--border);
    }
    .device-item .status { flex: 1; }
    .device-item .status-dot { flex-shrink: 0; }

    .slide-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .slide-card-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 22px;
      cursor: pointer;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .slide-card.open .slide-card-header { border-bottom-color: var(--border); }
    .slide-card-title { flex: 1; font-size: 13px; color: var(--white); }
    .slide-card-body { display: none; padding: 22px; }
    .slide-card.open .slide-card-body { display: block; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 7px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--dim2); }
    input, select, textarea {
      background: #1c1b2e;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--white);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 13px;
      padding: 9px 12px;
      transition: border-color 0.25s;
      width: 100%;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--gold-border); }

    .audio-upload-row { display: flex; gap: 8px; align-items: stretch; }
    .audio-upload-row input { flex: 1; }
    .audio-upload-label {
      flex-shrink: 0;
      padding: 9px 16px;
      background: var(--gold-dim);
      border: 1px dashed rgba(232, 169, 106, 0.28);
      border-radius: 2px;
      color: rgba(232, 169, 106, 0.6);
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .audio-upload-label:hover { background: rgba(232, 169, 106, 0.12); color: var(--gold); }
    .file-input { display: none; }

    .audio-player {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 10px 14px;
      margin-top: 8px;
    }
    .audio-player audio { flex: 1; }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--surface2);
      border: 1px solid var(--gold-border);
      color: var(--gold);
      padding: 12px 28px;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border-radius: 2px;
      opacity: 0;
      transition: all 0.4s ease;
      pointer-events: none;
      z-index: 9999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .stat-row { display: flex; gap: 12px; margin-bottom: 28px; }
    .stat-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 16px 20px; }
    .stat-label { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--dim2); margin-bottom: 6px; }
    .stat-value { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.8rem; color: var(--white); line-height: 1; }

    @media(max-width: 680px) {
      .form-grid { grid-template-columns: 1fr; }
      header { padding: 16px 20px; }
      main { padding: 24px 16px; }
      .stat-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"></div>
    <span class="logo-text">For <strong>Her</strong> — Admin</span>
  </div>
  <div class="header-right">
    <div class="status-badge" id="syncStatus">
      <span class="status-dot"></span>
      Connecting...
    </div>
    <button class="btn btn-ghost" onclick="previewSite()">▶ Preview</button>
    <button class="btn btn-primary" onclick="goExport()">Export JSON</button>
  </div>
</header>

<main>
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('slides',this)">Slides</button>
    <button class="tab" onclick="switchTab('songs',this)">Songs</button>
    <button class="tab" onclick="switchTab('devices',this)">Devices 📱</button>
    <button class="tab" onclick="switchTab('endcard',this)">End Card</button>
    <button class="tab" onclick="switchTab('pageedit',this)">Edit Page</button>
    <button class="tab" onclick="switchTab('export',this)">Export</button>
  </div>

  <!-- DEVICES TAB -->
  <div id="tab-devices" class="tab-content">
    <div class="device-panel">
      <h3 style="margin-bottom: 16px; font-size: 13px;">Connected Devices</h3>
      <div class="device-list" id="deviceList">
        <p style="color: var(--dim); font-size: 12px;">Loading devices...</p>
      </div>
    </div>
  </div>

  <!-- SLIDES -->
  <div id="tab-slides" class="tab-content active">
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-label">Total slides</div>
        <div class="stat-value" id="stat-slides">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Connected Viewers</div>
        <div class="stat-value" id="stat-viewers">0</div>
      </div>
    </div>
    <div id="slides-list"></div>
    <button class="btn-add" onclick="addSlide()" style="display: block; width: 100%; padding: 13px; background: var(--gold-dim); border: 1px dashed rgba(232,169,106,.25); border-radius: 2px; color: rgba(232,169,106,.6); font-family: 'Jost', sans-serif; font-size: 10px; letter-spacing: .2em; text-transform: uppercase; cursor: pointer; margin-top: 14px;">+ Add Slide</button>
  </div>

  <!-- SONGS -->
  <div id="tab-songs" class="tab-content">
    <div id="songs-list"></div>
    <button class="btn-add" onclick="addSong()" style="display: block; width: 100%; padding: 13px; background: var(--gold-dim); border: 1px dashed rgba(232,169,106,.25); border-radius: 2px; color: rgba(232,169,106,.6); font-family: 'Jost', sans-serif; font-size: 10px; letter-spacing: .2em; text-transform: uppercase; cursor: pointer; margin-top: 14px;">+ Add Song</button>
  </div>

  <!-- END CARD -->
  <div id="tab-endcard" class="tab-content">
    <div class="form-grid">
      <div class="form-group">
        <label>Pre-title</label>
        <input type="text" id="ec-pre" placeholder="With love, always" oninput="updateEndCard('pre', this.value)"/>
      </div>
      <div class="form-group">
        <label>Main title</label>
        <input type="text" id="ec-title" placeholder="Happy Birthday." oninput="updateEndCard('title', this.value)"/>
      </div>
      <div class="form-group full">
        <label>Message</label>
        <input type="text" id="ec-msg" placeholder="Message..." oninput="updateEndCard('msg', this.value)"/>
      </div>
    </div>
  </div>

  <!-- PAGE EDIT -->
  <div id="tab-pageedit" class="tab-content">
    <div class="form-grid">
      <div class="form-group">
        <label>Recipient Name</label>
        <input type="text" id="pg-name" placeholder="Her" oninput="updatePage('name', this.value)"/>
      </div>
      <div class="form-group">
        <label>Button Text</label>
        <input type="text" id="pg-btn" placeholder="Begin" oninput="updatePage('btn', this.value)"/>
      </div>
      <div class="form-group full">
        <label>Page Title</label>
        <input type="text" id="pg-title" placeholder="For Her." oninput="updatePage('title', this.value)"/>
      </div>
    </div>
  </div>

  <!-- EXPORT -->
  <div id="tab-export" class="tab-content">
    <div style="background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 28px;">
      <button class="btn btn-primary" onclick="downloadJSON()">⬇ Download content.json</button>
      <button class="btn btn-ghost" onclick="copyJSON()" style="margin-left: 10px;">Copy JSON</button>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="admin-client.js"></script>
</body>
</html>
