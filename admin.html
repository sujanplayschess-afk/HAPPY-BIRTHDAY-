<script>
// ─────────────────────────────────────────────
// ADMIN PANEL - Simple Save to Server
// ─────────────────────────────────────────────

let data = { songs: [], slides: [], endCard: {}, page: {} };
let viewers = 0;

// Load from server
async function loadData() {
  try {
    const res = await fetch('/api/state');
    if (res.ok) {
      data = await res.json();
      render();
      console.log('✓ Loaded');
    }
  } catch (e) {
    console.log('Starting fresh');
    data = getDefaultData();
    render();
  }
  
  // Check viewer count
  checkViewers();
  setInterval(checkViewers, 2000);
}

async function checkViewers() {
  try {
    const res = await fetch('/api/viewers');
    const result = await res.json();
    viewers = result.count;
    document.getElementById('stat-viewers').textContent = viewers;
  } catch (e) {}
}

// 🔴 SAVE TO SERVER (sends to all viewers)
async function saveToServer() {
  try {
    const res = await fetch('/api/state', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    
    const result = await res.json();
    if (result.ok) {
      toast(`✓ Sent to ${viewers} viewer${viewers !== 1 ? 's' : ''}`);
      console.log(`📤 Sent to ${viewers} viewers`);
    }
  } catch (e) {
    toast('❌ Failed to send');
    console.error(e);
  }
}

// ─────────────────────────────────────────────
// UPDATE HANDLERS (Auto-save)
// ─────────────────────────────────────────────

function updateSlide(i, key, val) {
  if (!data.slides[i]) return;
  data.slides[i][key] = val;
  saveToServer();
}

function updateLine(slideIdx, lineIdx, key, val) {
  if (!data.slides[slideIdx].lines) data.slides[slideIdx].lines = [];
  if (!data.slides[slideIdx].lines[lineIdx]) data.slides[slideIdx].lines[lineIdx] = {};
  data.slides[slideIdx].lines[lineIdx][key] = val;
  saveToServer();
}

function updateSong(i, key, val) {
  if (!data.songs[i]) return;
  data.songs[i][key] = val;
  saveToServer();
}

function updateEndCard(key, val) {
  if (!data.endCard) data.endCard = {};
  data.endCard[key] = val;
  setPreview(data.endCard);
  saveToServer();
}

function updatePage(key, val) {
  if (!data.page) data.page = {};
  data.page[key] = val;
  refreshMockPreview();
  saveToServer();
}

function addSlide() {
  data.slides.push({
    img:'https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1600&q=85',
    tint:'rgba(5,5,20,0.32)', kenBurns:'zoom-in',
    pos:'pos-bc', song:0, dur:9000,
    lines:[{ text:'Write something beautiful.', delay:1, color:'gold' }]
  });
  saveToServer();
  renderSlides();
}

function deleteSlide(i) {
  if (!confirm(`Delete slide ${i+1}?`)) return;
  data.slides.splice(i, 1);
  saveToServer();
  renderSlides();
}

function addSong() {
  data.songs.push({ title:'New Song — Artist', start:0, volume:0.85, fadeIn:800, fadeOut:1200 });
  saveToServer();
  renderSongs();
}

function deleteSong(i) {
  if (!confirm(`Delete Song ${i+1}?`)) return;
  data.songs.splice(i, 1);
  data.slides.forEach(sl => { if (sl.song >= data.songs.length) sl.song = Math.max(0, data.songs.length-1); });
  saveToServer();
  renderSongs();
}

function handleAudioUpload(songIdx, input) {
  const file = input.files[0];
  if (!file) return;

  const maxMB = 10;
  if (file.size > maxMB * 1024 * 1024) {
    toast(`File too large — max ${maxMB}MB`);
    input.value = '';
    return;
  }

  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    data.songs[songIdx].audioData = dataUrl;
    data.songs[songIdx].audioUrl = dataUrl;
    data.songs[songIdx].fileName = file.name;
    
    if (!data.songs[songIdx].title || data.songs[songIdx].title === 'New Song — Artist') {
      const nameNoExt = file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
      data.songs[songIdx].title = nameNoExt;
    }
    
    saveToServer();
    renderSongs();
    toast(`📤 ${file.name} sent to viewers`);
  };
  reader.readAsDataURL(file);
}

function clearAudio(songIdx) {
  if (!confirm('Remove audio?')) return;
  delete data.songs[songIdx].audioData;
  delete data.songs[songIdx].audioUrl;
  delete data.songs[songIdx].fileName;
  saveToServer();
  renderSongs();
}

function handleImgUpload(slideIdx, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    data.slides[slideIdx].img = e.target.result;
    saveToServer();
    const urlInput = document.getElementById(`img-url-${slideIdx}`);
    if (urlInput) urlInput.value = file.name + ' (uploaded)';
    previewImg(slideIdx, e.target.result);
    toast('📤 Image sent to viewers');
  };
  reader.readAsDataURL(file);
}

function previewImg(slideIdx, src) {
  const prev = document.getElementById(`img-prev-${slideIdx}`);
  if (!prev) return;
  if (src && src.length > 5) { prev.src = src; prev.classList.add('show'); }
  else prev.classList.remove('show');
}

// ─────────────────────────────────────────────
// RENDER (All rendering functions - same as before)
// ─────────────────────────────────────────────

function render() {
  renderSlides();
  renderSongs();
  renderEndCard();
  renderPageEditor();
  updateStats();
}

function updateStats() {
  document.getElementById('stat-slides').textContent = data.slides.length;
  const totalMs = (data.slides||[]).reduce((s,sl) => s+(sl.dur||9000), 0);
  const mins = Math.floor(totalMs/60000);
  const secs = Math.round((totalMs%60000)/1000);
  document.getElementById('stat-dur').textContent = `${mins}m ${secs}s`;
}

function renderSlides() {
  const list = document.getElementById('slides-list');
  list.innerHTML = '';
  (data.slides||[]).forEach((s,i) => {
    const card = document.createElement('div');
    card.className = 'slide-card';
    card.dataset.index = i;
    const songObj = data.songs[s.song];
    const songTitle = songObj ? (songObj.title || `Song ${(s.song||0)+1}`).split(' — ')[0] : `Song ${(s.song||0)+1}`;
    const firstLine = (s.lines && s.lines[0] && s.lines[0].text) ? s.lines[0].text : 'Slide';

    card.innerHTML = `
      <div class="slide-card-header" onclick="toggleCard(this)">
        <div class="slide-num">${i+1}</div>
        <div class="slide-card-title">${escHtml(truncate(firstLine,42))}</div>
        <div class="slide-card-meta">${(s.dur||9000)/1000|0}s &nbsp;·&nbsp; ${escHtml(songTitle)}</div>
        <div class="slide-toggle">▾</div>
      </div>
      <div class="slide-card-body">
        <div class="form-grid">
          <div class="form-group full">
            <label>Background Image</label>
            <div class="upload-row">
              <input type="url" id="img-url-${i}" placeholder="https://..."
                value="${escAttr(s.img||'')}"
                oninput="updateSlide(${i},'img',this.value);previewImg(${i},this.value)"/>
              <label class="upload-label" for="img-file-${i}">↑ Upload</label>
              <input class="file-input" type="file" id="img-file-${i}" accept="image/*" onchange="handleImgUpload(${i},this)"/>
            </div>
            <img id="img-prev-${i}" class="img-preview" src="${escAttr(s.img||'')}"
              onerror="this.classList.remove('show')" onload="this.classList.add('show')" alt=""/>
          </div>

          <div class="form-group">
            <label>Text Position</label>
            <select onchange="updateSlide(${i},'pos',this.value)">
              ${['pos-bc','pos-bl','pos-br','pos-mc','pos-ml','pos-tc','pos-tr','pos-fc'].map(v=>
                `<option value="${v}" ${(s.pos||'pos-bc')===v?'selected':''}>${v.replace('pos-','')}</option>`
              ).join('')}
            </select>
          </div>

          <div class="form-group">
            <label>Motion</label>
            <select onchange="updateSlide(${i},'kenBurns',this.value)">
              ${[['zoom-in','Zoom In'],['zoom-out','Zoom Out'],['pan-right','Pan Right'],['pan-left','Pan Left']].map(([v,l])=>
                `<option value="${v}" ${(s.kenBurns||'zoom-in')===v?'selected':''}>${l}</option>`
              ).join('')}
            </select>
          </div>

          <div class="form-group">
            <label>Music Track</label>
            <select onchange="updateSlide(${i},'song',+this.value)">
              ${(data.songs||[]).map((sg,si)=>
                `<option value="${si}" ${(s.song||0)===si?'selected':''}>${si+1}. ${escHtml(sg.title||'Song')}</option>`
              ).join('')}
            </select>
          </div>

          <div class="form-group">
            <label>Duration (ms)</label>
            <input type="number" min="3000" max="30000" step="500"
              value="${s.dur||9000}" onchange="updateSlide(${i},'dur',+this.value)"/>
          </div>

          <div class="form-group full">
            <label>Lyrics</label>
            <div class="lines-editor" id="lines-editor-${i}">
              ${renderLineRows(i, s.lines||[])}
            </div>
            <button class="add-line-btn" onclick="addLine(${i})">+ Add Line</button>
          </div>
        </div>
        <div class="form-footer">
          <button class="btn btn-danger" onclick="deleteSlide(${i})">Delete</button>
          <button class="btn btn-ghost" style="padding:6px 14px;font-size:9px" onclick="duplicateSlide(${i})">⧉ Duplicate</button>
        </div>
      </div>`;
    list.appendChild(card);
  });
  updateStats();
}

function renderLineRows(slideIdx, lines) {
  const colors = ['(default)','gold','rose','blue','dim'];
  const sizes  = ['(normal)','hero','big','med','sm','xs'];
  const delays = [0,1,2,3,4,5];
  return lines.map((ln, li) => `
    <div class="line-row">
      <input type="text" value="${escAttr(ln.text||'')}"
        oninput="updateLine(${slideIdx},${li},'text',this.value)"
        placeholder="Text…"/>
      <select onchange="updateLine(${slideIdx},${li},'color',this.value)">
        ${colors.map(c=>c==='(default)'
          ? `<option value="" ${!(ln.color)?'selected':''}>color</option>`
          : `<option value="${c}" ${(ln.color||'')===c?'selected':''}>${c}</option>`
        ).join('')}
      </select>
      <select onchange="updateLine(${slideIdx},${li},'size',this.value)">
        ${sizes.map(sz=>sz==='(normal)'
          ? `<option value="" ${!(ln.size)?'selected':''}>size</option>`
          : `<option value="${sz}" ${(ln.size||'')===sz?'selected':''}>${sz}</option>`
        ).join('')}
      </select>
      <button class="del-line" onclick="deleteLine(${slideIdx},${li})">×</button>
    </div>`).join('');
}

function addLine(slideIdx) {
  if (!data.slides[slideIdx].lines) data.slides[slideIdx].lines = [];
  data.slides[slideIdx].lines.push({ text:'', delay: 1 });
  saveToServer();
  renderSlides();
}

function deleteLine(slideIdx, lineIdx) {
  data.slides[slideIdx].lines.splice(lineIdx, 1);
  saveToServer();
  renderSlides();
}

function duplicateSlide(i) {
  const copy = JSON.parse(JSON.stringify(data.slides[i]));
  data.slides.splice(i+1, 0, copy);
  saveToServer();
  renderSlides();
}

function renderSongs() {
  const list = document.getElementById('songs-list');
  list.innerHTML = '';
  (data.songs||[]).forEach((s, i) => {
    const hasAudio = !!(s.audioData || s.audioUrl);
    const card = document.createElement('div');
    card.className = 'song-card';
    card.innerHTML = `
      <div class="song-header">
        <div class="song-num">${i+1}</div>
        <div class="song-label">${escHtml(s.title||'Song')}</div>
        <div class="song-idx">Index ${i}</div>
        <button class="btn btn-danger" onclick="deleteSong(${i})">Remove</button>
      </div>
      <div class="form-grid">
        <div class="form-group full">
          <label>Song Title</label>
          <input type="text" value="${escAttr(s.title||'')}" placeholder="Song — Artist"
            oninput="updateSong(${i},'title',this.value)"/>
        </div>

        <div class="form-group full">
          <label>Audio File</label>
          <div class="audio-upload-row">
            <input type="text" id="audio-name-${i}" readonly
              value="${escAttr(s.fileName || '')}"
              placeholder="No file selected"/>
            <label class="audio-upload-label" for="audio-file-${i}">
              ♪ ${hasAudio ? 'Replace' : 'Upload'}
            </label>
            <input class="file-input" type="file" id="audio-file-${i}"
              accept="audio/*"
              onchange="handleAudioUpload(${i},this)"/>
          </div>
          ${hasAudio ? `
            <div class="audio-player-mini">
              <audio controls preload="metadata">
                <source src="${escAttr(s.audioData||s.audioUrl||'')}" type="audio/mpeg">
              </audio>
              <button class="btn btn-danger" style="padding:5px 10px;font-size:9px" onclick="clearAudio(${i})">✕</button>
            </div>` : ''}
        </div>

        <div class="form-group">
          <label>Volume</label>
          <input type="number" min="0" max="1" step="0.05" value="${s.volume||0.85}"
            onchange="updateSong(${i},'volume',+this.value)"/>
        </div>
      </div>`;
    list.appendChild(card);
  });
}

function renderEndCard() {
  const ec = data.endCard || {};
  setValue('ec-pre',   ec.pre   || '');
  setValue('ec-title', ec.title || '');
  setValue('ec-sub',   ec.sub   || '');
  setValue('ec-msg',   ec.msg   || '');
  setPreview(ec);
}

function setPreview(ec) {
  setElText('prev-pre',   ec.pre   || 'With love, always');
  setElText('prev-title', ec.title || 'Happy Birthday.');
  setElText('prev-sub',   ec.sub   || 'You deserve the whole world.');
  setElText('prev-msg',   (ec.msg  || '').replace(/\\n/g,'\n'));
}

function renderPageEditor() {
  const pg = data.page || {};
  setValue('pg-eyebrow',  pg.eyebrow  || '');
  setValue('pg-title',    pg.title    || '');
  setValue('pg-sub',      pg.sub      || '');
  setValue('pg-btn',      pg.btn      || '');
  setValue('pg-desc',     pg.desc     || '');
  setValue('pg-footnote', pg.footnote || '');
  setValue('pg-tabtitle', pg.tabTitle || '');
  setValue('pg-name',     pg.name     || '');
  setValue('pg-color-accent', pg.colorAccent || '#e8a96a');
  setValue('pg-color-bg',     pg.colorBg     || '#09080f');
  refreshMockPreview();
}

function refreshMockPreview() {
  const pg = data.page || {};
  setElText('mock-eyebrow', pg.eyebrow  || 'A Gift in Sound & Vision');
  setElText('mock-title',   pg.title    || 'For Her.');
  setElText('mock-sub',     pg.sub      || 'A love letter in music');
  setElText('mock-desc',    pg.desc     || 'Every song chosen with intention...');
  setElText('mock-btn',     pg.btn      || 'Begin');
}

function syncColor(key, val) {
  updatePage(key === 'accent' ? 'colorAccent' : 'colorBg', val);
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function toggleCard(header) { header.parentElement.classList.toggle('open'); }
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}
function previewSite() { window.open('/', '_blank'); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s).replace(/"/g,'&quot;'); }
function truncate(s,n) { return s.length>n ? s.slice(0,n)+'…' : s; }
function setValue(id, val) { const el = document.getElementById(id); if (el) el.value = val; }
function setElText(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }

function getDefaultData() {
  return {
    songs: [
      { title: "Song 1", start: 0, volume: 0.85 },
      { title: "Song 2", start: 0, volume: 0.85 }
    ],
    slides: [
      {img:"https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1600&q=85",kenBurns:"zoom-in",pos:"pos-bc",song:0,dur:9000,lines:[{text:"Start here",delay:1,color:"gold"}]}
    ],
    endCard: { pre:"With love", title:"Happy Birthday", sub:"You rock", msg:"This is for you" },
    page: { eyebrow:"Gift",title:"For You",btn:"Begin",name:"You" }
  };
}

loadData();
</script>
