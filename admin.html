<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — For Her</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#09080f;--surface:#111019;--surface2:#161524;--surface3:#1c1b2e;--border:rgba(255,255,255,0.07);--border-hover:rgba(255,255,255,0.13);--gold:#e8a96a;--gold-dim:rgba(232,169,106,0.12);--gold-border:rgba(232,169,106,0.22);--white:#f0e8da;--dim:rgba(240,232,218,0.42);--dim2:rgba(240,232,218,0.22);--danger:#c45c5c;--success:#5aac7e;--ph:'Playfair Display',serif;--fb:'Jost',sans-serif;}
body{background:var(--bg);color:var(--white);font-family:var(--fb);font-weight:300;min-height:100vh;padding-bottom:80px;}
header{display:flex;align-items:center;justify-content:space-between;padding:20px 36px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(9,8,15,.95);backdrop-filter:blur(12px);z-index:100;}
.logo{display:flex;align-items:center;gap:14px;}
.logo-icon{width:30px;height:30px;border:1px solid var(--gold-border);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-icon::after{content:'';width:0;height:0;border-left:8px solid var(--gold);border-top:4.5px solid transparent;border-bottom:4.5px solid transparent;margin-left:2px;}
.logo-text{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);}
.logo-text strong{color:var(--white);font-weight:400;}
.header-right{display:flex;gap:10px;align-items:center;}
.status{font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:6px 14px;border-radius:10px;background:rgba(90,172,126,0.12);border:1px solid rgba(90,172,126,0.25);color:var(--success);}

.btn{padding:9px 22px;font-family:var(--fb);font-weight:300;font-size:10px;letter-spacing:.18em;text-transform:uppercase;border:none;border-radius:2px;cursor:pointer;transition:all .3s;line-height:1;}
.btn-primary{background:var(--gold);color:#09080f;font-weight:500;}
.btn-primary:hover{filter:brightness(1.08);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--dim);}
.btn-ghost:hover{border-color:var(--gold-border);color:var(--gold);}
.btn-danger{background:transparent;border:1px solid rgba(196,92,92,.25);color:var(--danger);padding:6px 14px;font-size:9px;}
.btn-danger:hover{background:rgba(196,92,92,.08);}
.btn-add{display:block;width:100%;padding:13px;background:var(--gold-dim);border:1px dashed rgba(232,169,106,.25);border-radius:2px;color:rgba(232,169,106,.6);font-family:var(--fb);font-size:10px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:all .3s;margin-top:14px;}
.btn-add:hover{background:rgba(232,169,106,.1);color:var(--gold);border-color:var(--gold-border);}

main{max-width:1180px;margin:0 auto;padding:36px 28px;}

.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:36px;gap:2px;flex-wrap:wrap;}
.tab{padding:12px 24px;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim2);cursor:pointer;border-bottom:2px solid transparent;transition:all .3s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--fb);font-weight:300;}
.tab:hover{color:var(--dim);}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab-content{display:none;}
.tab-content.active{display:block;}

.slides-list{display:flex;flex-direction:column;gap:14px;}
.slide-card{background:var(--surface);border:1px solid var(--border);border-radius:3px;overflow:hidden;transition:border-color .25s;}
.slide-card:hover{border-color:var(--border-hover);}
.slide-card.open{border-color:rgba(232,169,106,.18);}

.slide-card-header{display:flex;align-items:center;gap:14px;padding:15px 22px;cursor:pointer;border-bottom:1px solid transparent;transition:border-color .2s;}
.slide-card.open .slide-card-header{border-bottom-color:var(--border);}

.slide-num{width:26px;height:26px;border:1px solid var(--gold-border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--gold);flex-shrink:0;font-weight:300;}
.slide-card-title{flex:1;font-size:13px;letter-spacing:.02em;color:var(--white);}
.slide-card-meta{font-size:10px;color:var(--dim2);letter-spacing:.1em;}
.slide-toggle{color:var(--dim2);transition:transform .3s;font-size:10px;}
.slide-card.open .slide-toggle{transform:rotate(180deg);}

.slide-card-body{display:none;padding:22px;}
.slide-card.open .slide-card-body{display:block;}

.songs-list{display:flex;flex-direction:column;gap:12px;}
.song-card{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:18px 22px;transition:border-color .25s;}
.song-card:hover{border-color:var(--border-hover);}

.song-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.song-num{width:30px;height:30px;background:var(--gold-dim);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--ph);font-style:italic;font-size:13px;color:var(--gold);flex-shrink:0;}
.song-label{flex:1;font-size:14px;color:var(--white);}
.song-idx{font-size:9px;color:var(--gold);letter-spacing:.15em;background:rgba(232,169,106,.08);padding:3px 10px;border-radius:10px;text-transform:uppercase;}

.audio-player-mini{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:2px;padding:10px 14px;margin-top:8px;}
.audio-player-mini audio{flex:1;height:28px;filter:invert(0.8) sepia(1) saturate(0.4) hue-rotate(340deg);}
.audio-badge{font-size:9px;letter-spacing:.12em;background:rgba(90,172,126,.12);border:1px solid rgba(90,172,126,.25);color:var(--success);padding:3px 10px;border-radius:10px;white-space:nowrap;flex-shrink:0;}

.audio-upload-row{display:flex;gap:8px;align-items:stretch;}
.audio-upload-row input[type="text"]{flex:1;}
.audio-upload-label{flex-shrink:0;padding:9px 16px;background:var(--gold-dim);border:1px dashed rgba(232,169,106,.28);border-radius:2px;color:rgba(232,169,106,.6);font-family:var(--fb);font-size:10px;letter-spacing:.15em;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.audio-upload-label:hover{background:rgba(232,169,106,.12);color:var(--gold);}
.file-input{display:none;}

.audio-empty{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px dashed rgba(232,169,106,.18);border-radius:2px;padding:12px 14px;margin-top:8px;}
.audio-empty-icon{font-size:18px;opacity:.35;flex-shrink:0;}
.audio-empty-text{font-size:11px;color:var(--dim2);line-height:1.5;}

.endcard-wrap{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:28px;}
.preview-card{background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:28px;text-align:center;margin-bottom:28px;}
.preview-pre{font-size:9px;letter-spacing:.4em;text-transform:uppercase;color:rgba(232,169,106,.5);margin-bottom:10px;}
.preview-title{font-family:var(--ph);font-style:italic;font-size:clamp(2rem,5vw,3.5rem);color:var(--white);line-height:1;margin-bottom:6px;}
.preview-sub{font-family:var(--ph);font-style:italic;font-size:1.1rem;color:rgba(232,169,106,.6);}
.preview-orn{display:flex;align-items:center;justify-content:center;gap:12px;margin:18px 0;}
.preview-line{width:50px;height:1px;}
.preview-line.l{background:linear-gradient(to right,transparent,rgba(232,169,106,.3));}
.preview-line.r{background:linear-gradient(to left,transparent,rgba(232,169,106,.3));}
.preview-diamond{width:4px;height:4px;background:var(--gold);transform:rotate(45deg);}
.preview-msg{font-family:var(--ph);font-style:italic;font-size:1rem;color:rgba(240,232,218,.4);line-height:1.7;}

.page-editor-wrap{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:28px;}
.page-preview-mock{background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:32px;text-align:center;margin-bottom:28px;position:relative;overflow:hidden;}
.page-preview-mock::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(232,169,106,0.06) 0%,transparent 70%);}
.mock-eyebrow{font-size:8px;letter-spacing:.5em;text-transform:uppercase;color:rgba(232,169,106,.4);margin-bottom:16px;}
.mock-title{font-family:var(--ph);font-style:italic;font-size:clamp(1.8rem,5vw,3rem);color:var(--white);line-height:1.1;margin-bottom:8px;}
.mock-sub{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--dim2);margin-bottom:20px;}
.mock-desc{font-size:13px;color:var(--dim);line-height:1.8;max-width:480px;margin:0 auto 20px;}
.mock-btn{display:inline-block;padding:12px 36px;background:var(--gold);color:#09080f;font-family:var(--fb);font-size:10px;letter-spacing:.22em;text-transform:uppercase;font-weight:500;border-radius:2px;}
.mock-footnote{font-size:10px;color:var(--dim2);margin-top:14px;letter-spacing:.1em;}

.section-title{font-size:9px;letter-spacing:.38em;text-transform:uppercase;color:rgba(232,169,106,.5);margin-bottom:18px;display:flex;align-items:center;gap:10
