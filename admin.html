<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — For Her</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500&display=swap');

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0d12;--surface:#141418;--surface2:#1a1a21;
      --border:rgba(255,255,255,0.07);
      --gold:#c8a96e;--gold-faint:rgba(200,169,110,0.08);
      --white:#e8e4dc;--dim:rgba(232,228,220,0.5);
      --danger:#c0504a;--success:#4a9c6e;
      --amber:#e8a96a;--rose:#d4898a;--blue:#7aafd4;
      --font:'Jost',sans-serif;
    }
    body{background:var(--bg);color:var(--white);font-family:var(--font);
      font-weight:300;min-height:100vh;padding-bottom:80px;}

    /* HEADER */
    header{display:flex;align-items:center;justify-content:space-between;
      padding:20px 32px;border-bottom:1px solid var(--border);
      position:sticky;top:0;background:var(--bg);z-index:100;}
    .logo{display:flex;align-items:center;gap:12px;}
    .logo-mark{width:28px;height:28px;border:1px solid var(--gold);
      border-radius:50%;display:flex;align-items:center;justify-content:center;}
    .logo-mark::before{content:'';width:0;height:0;
      border-left:7px solid var(--gold);
      border-top:4px solid transparent;border-bottom:4px solid transparent;}
    .logo-text{font-size:13px;letter-spacing:.18em;text-transform:uppercase;
      color:var(--white);font-weight:300;}
    .logo-text span{color:var(--gold);}
    .header-actions{display:flex;gap:10px;}

    /* BUTTONS */
    .btn{padding:9px 20px;font-family:var(--font);font-weight:300;font-size:11px;
      letter-spacing:.15em;text-transform:uppercase;border:none;border-radius:2px;
      cursor:pointer;transition:all .25s;}
    .btn-primary{background:var(--gold);color:#0d0d12;font-weight:500;}
    .btn-primary:hover{filter:brightness(1.1);}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--dim);}
    .btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
    .btn-danger{background:transparent;border:1px solid rgba(192,80,74,.3);
      color:var(--danger);padding:6px 14px;font-size:10px;}
    .btn-danger:hover{background:rgba(192,80,74,.1);}
    .btn-add{background:var(--gold-faint);border:1px dashed rgba(200,169,110,.3);
      color:var(--gold);width:100%;padding:12px;margin-top:12px;border-radius:2px;
      font-size:11px;letter-spacing:.15em;cursor:pointer;transition:all .25s;
      font-family:var(--font);}
    .btn-add:hover{background:rgba(200,169,110,.12);}

    /* LAYOUT */
    main{max-width:1160px;margin:0 auto;padding:32px 24px;}
    .tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:32px;}
    .tab{padding:12px 24px;font-size:11px;letter-spacing:.2em;text-transform:uppercase;
      color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;
      transition:all .25s;background:none;border-top:none;border-left:none;
      border-right:none;font-family:var(--font);font-weight:300;}
    .tab.active{color:var(--gold);border-bottom-color:var(--gold);}
    .tab-content{display:none;}
    .tab-content.active{display:block;}

    /* SLIDE CARDS */
    .slides-list{display:flex;flex-direction:column;gap:16px;}
    .slide-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
    .slide-card-header{display:flex;align-items:center;gap:12px;padding:14px 20px;
      cursor:pointer;border-bottom:1px solid transparent;transition:border-color .2s;}
    .slide-card.open .slide-card-header{border-bottom-color:var(--border);}
    .slide-num{width:28px;height:28px;border:1px solid var(--gold);border-radius:50%;
      display:flex;align-items:center;justify-content:center;font-size:11px;
      color:var(--gold);flex-shrink:0;}
    .slide-card-title{flex:1;font-size:13px;letter-spacing:.06em;}
    .slide-card-meta{font-size:10px;color:var(--dim);letter-spacing:.1em;}
    .slide-toggle{color:var(--dim);transition:transform .25s;font-size:12px;}
    .slide-card.open .slide-toggle{transform:rotate(180deg);}
    .slide-card-body{display:none;padding:20px;}
    .slide-card.open .slide-card-body{display:block;}

    /* SONG CARDS */
    .songs-list{display:flex;flex-direction:column;gap:12px;}
    .song-card{background:var(--surface);border:1px solid var(--border);
      border-radius:4px;padding:16px 20px;}
    .song-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
    .song-icon{width:32px;height:32px;background:var(--gold-faint);border-radius:50%;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
      color:var(--gold);font-size:14px;}
    .song-label{flex:1;font-size:13px;}
    .song-badge{font-size:10px;color:var(--gold);letter-spacing:.1em;
      background:rgba(200,169,110,.1);padding:3px 10px;border-radius:10px;}

    /* END CARD EDITOR */
    .endcard-section{background:var(--surface);border:1px solid var(--border);
      border-radius:4px;padding:24px;}
    .section-title{font-size:10px;letter-spacing:.3em;text-transform:uppercase;
      color:var(--gold);margin-bottom:16px;}

    /* FORMS */
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .form-group{display:flex;flex-direction:column;gap:6px;}
    .form-group.full{grid-column:1/-1;}
    label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);}
    input,select,textarea{background:var(--surface2);border:1px solid var(--border);
      border-radius:2px;color:var(--white);font-family:var(--font);font-weight:300;
      font-size:13px;padding:9px 12px;transition:border-color .2s;width:100%;}
    input:focus,select:focus,textarea:focus{outline:none;border-color:rgba(200,169,110,.4);}
    select option{background:var(--surface2);}
    textarea{resize:vertical;min-height:70px;}

    /* IMAGE UPLOAD */
    .img-upload-wrap{position:relative;}
    .img-preview{width:100%;height:90px;object-fit:cover;border-radius:2px;
      border:1px solid var(--border);margin-top:8px;display:none;background:#111;}
    .img-preview.show{display:block;}
    .upload-row{display:flex;gap:8px;align-items:stretch;}
    .upload-row input[type="url"]{flex:1;}
    .upload-btn{flex-shrink:0;padding:9px 14px;background:var(--gold-faint);
      border:1px dashed rgba(200,169,110,.35);border-radius:2px;color:var(--gold);
      font-family:var(--font);font-size:10px;letter-spacing:.12em;cursor:pointer;
      transition:all .25s;white-space:nowrap;}
    .upload-btn:hover{background:rgba(200,169,110,.14);}
    .file-input{display:none;}

    /* LINES EDITOR */
    .lines-editor{display:flex;flex-direction:column;gap:8px;}
    .line-row{display:flex;gap:8px;align-items:center;}
    .line-row input[type="text"]{flex:1;}
    .line-row select{width:110px;flex-shrink:0;}
    .line-row .btn-danger{flex-shrink:0;}
    .add-line-btn{background:transparent;border:1px dashed rgba(200,169,110,.2);
      color:rgba(200,169,110,.5);font-family:var(--font);font-size:10px;
      letter-spacing:.14em;padding:7px;cursor:pointer;border-radius:2px;
      transition:all .25s;width:100%;margin-top:4px;}
    .add-line-btn:hover{border-color:var(--gold);color:var(--gold);}

    /* COLOR DOTS for line preview */
    .color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
    .color-dot.gold{background:var(--amber);}
    .color-dot.rose{background:var(--rose);}
    .color-dot.blue{background:var(--blue);}
    .color-dot.none{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.15);}

    /* FORM FOOTER */
    .form-footer{display:flex;justify-content:flex-end;align-items:center;
      gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}

    /* EXPORT */
    .export-section{background:var(--surface);border:1px solid var(--border);
      border-radius:4px;padding:28px;}
    .export-title{font-size:12px;letter-spacing:.25em;text-transform:uppercase;
      color:var(--gold);margin-bottom:8px;}
    .export-desc{font-size:13px;color:var(--dim);line-height:1.7;margin-bottom:20px;}
    .json-preview{background:var(--surface2);border:1px solid var(--border);
      border-radius:2px;padding:16px;font-family:'Courier New',monospace;font-size:11px;
      color:var(--dim);max-height:260px;overflow:auto;white-space:pre-wrap;margin-bottom:16px;}

    /* TOAST */
    .toast{position:fixed;bottom:32px;left:50%;
      transform:translateX(-50%) translateY(20px);
      background:var(--surface2);border:1px solid rgba(200,169,110,.3);
      color:var(--gold);padding:12px 28px;font-size:11px;letter-spacing:.15em;
      border-radius:2px;opacity:0;transition:all .4s ease;pointer-events:none;z-index:9999;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    /* DRAG */
    .drag-handle{cursor:grab;color:var(--dim);padding:2px 6px 2px 0;
      font-size:14px;user-select:none;}
    .drag-handle:active{cursor:grabbing;}

    /* DIVIDER */
    .section-divider{height:1px;background:var(--border);margin:28px 0;}

    @media(max-width:640px){
      .form-grid{grid-template-columns:1fr;}
      header{padding:16px;}
      main{padding:20px 12px;}
      .upload-row{flex-direction:column;}
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark"></div>
    <span class="logo-text">For <span>Her</span> — Admin</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="previewSite()">▶ Preview</button>
    <button class="btn btn-primary" onclick="goExport()">Export JSON</button>
  </div>
</header>

<main>
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('slides',this)">Slides</button>
    <button class="tab" onclick="switchTab('songs',this)">Songs</button>
    <button class="tab" onclick="switchTab('endcard',this)">End Card</button>
    <button class="tab" onclick="switchTab('export',this)">Export</button>
  </div>

  <!-- SLIDES TAB -->
  <div id="tab-slides" class="tab-content active">
    <div class="slides-list" id="slides-list"></div>
    <button class="btn-add" onclick="addSlide()">+ Add Slide</button>
  </div>

  <!-- SONGS TAB -->
  <div id="tab-songs" class="tab-content">
    <div class="songs-list" id="songs-list"></div>
    <button class="btn-add" onclick="addSong()">+ Add Song</button>
  </div>

  <!-- END CARD TAB -->
  <div id="tab-endcard" class="tab-content">
    <div class="endcard-section">
      <p class="section-title">End Card Text</p>
      <div class="form-grid">
        <div class="form-group">
          <label>Pre-title (small caps)</label>
          <input type="text" id="ec-pre" oninput="updateEndCard('pre',this.value)"/>
        </div>
        <div class="form-group">
          <label>Main Title</label>
          <input type="text" id="ec-title" oninput="updateEndCard('title',this.value)"/>
        </div>
        <div class="form-group">
          <label>Subtitle</label>
          <input type="text" id="ec-sub" oninput="updateEndCard('sub',this.value)"/>
        </div>
        <div class="form-group">
          <label>Song Note (bottom line)</label>
          <input type="text" id="ec-note" oninput="updateEndCard('note',this.value)"/>
        </div>
      </div>
    </div>
  </div>

  <!-- EXPORT TAB -->
  <div id="tab-export" class="tab-content">
    <div class="export-section">
      <p class="export-title">Export content.json</p>
      <p class="export-desc">
        Copy or download this JSON and save as <strong>content.json</strong>
        in the same folder as <strong>index.html</strong>.
        The site will load it automatically.
      </p>
      <div class="json-preview" id="json-preview"></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="downloadJSON()">⬇ Download content.json</button>
        <button class="btn btn-ghost" onclick="copyJSON()">Copy to Clipboard</button>
        <button class="btn btn-ghost" onclick="resetData()">↺ Reset to Defaults</button>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
/* =============================================
   ADMIN ENGINE
   ============================================= */

// ── DATA STORE ─────────────────────────────
let data = { songs: [], slides: [], endCard: {} };

async function loadData() {
  const saved = localStorage.getItem('forHerAdmin');
  if (saved) {
    try { data = JSON.parse(saved); }
    catch { data = getDefaultData(); }
  } else {
    try {
      const res = await fetch('content.json');
      if (!res.ok) throw new Error();
      data = await res.json();
    } catch {
      data = getDefaultData();
    }
  }
  renderAll();
}

function save() {
  localStorage.setItem('forHerAdmin', JSON.stringify(data));
}

// ── RENDER ALL ──────────────────────────────
function renderAll() {
  renderSlides();
  renderSongs();
  renderEndCard();
}

// ══════════════════════════════════════════
// SLIDES
// ══════════════════════════════════════════
function renderSlides() {
  const list = document.getElementById('slides-list');
  list.innerHTML = '';
  (data.slides || []).forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'slide-card';
    card.dataset.index = i;

    const songTitle = data.songs[s.song]
      ? data.songs[s.song].title
      : `Song ${(s.song||0)+1}`;

    card.innerHTML = `
      <div class="slide-card-header" onclick="toggleCard(this)">
        <span class="drag-handle" title="Drag">⠿</span>
        <div class="slide-num">${i+1}</div>
        <div class="slide-card-title">${escHtml(truncate(firstLineText(s),38))}</div>
        <div class="slide-card-meta">${s.dur/1000|0}s &nbsp;·&nbsp; ${songTitle}</div>
        <div class="slide-toggle">▾</div>
      </div>
      <div class="slide-card-body">
        <div class="form-grid">

          <!-- IMAGE -->
          <div class="form-group full">
            <label>Background Image</label>
            <div class="img-upload-wrap">
              <div class="upload-row">
                <input type="url" id="img-url-${i}" placeholder="https://..."
                  value="${escAttr(s.img||s.image||'')}"
                  oninput="updateSlide(${i},'img',this.value);previewImg(${i},this.value)"/>
                <label class="upload-btn" for="img-file-${i}">📁 Upload</label>
                <input class="file-input" type="file" id="img-file-${i}"
                  accept="image/*" onchange="handleImgUpload(${i},this)"/>
              </div>
              <img id="img-prev-${i}" class="img-preview"
                src="${escAttr(s.img||s.image||'')}"
                onerror="this.classList.remove('show')"
                onload="this.classList.add('show')"
                alt="preview"/>
            </div>
          </div>

          <!-- POSITION -->
          <div class="form-group">
            <label>Text Position</label>
            <select onchange="updateSlide(${i},'pos',this.value)">
              ${['pos-bc','pos-bl','pos-br','pos-mc','pos-ml','pos-tc','pos-tr'].map(v=>
                `<option value="${v}" ${s.pos===v?'selected':''}>${v.replace('pos-','')}</option>`
              ).join('')}
            </select>
          </div>

          <!-- KEN BURNS -->
          <div class="form-group">
            <label>Ken Burns</label>
            <select onchange="updateSlide(${i},'kenBurns',this.value)">
              ${['zoom-in','zoom-out','pan-right','pan-left','drift-up'].map(v=>
                `<option value="${v}" ${s.kenBurns===v?'selected':''}>${v}</option>`
              ).join('')}
            </select>
          </div>

          <!-- SONG -->
          <div class="form-group">
            <label>Song</label>
            <select onchange="updateSlide(${i},'song',+this.value)">
              ${(data.songs||[]).map((sg,si)=>
                `<option value="${si}" ${s.song===si?'selected':''}>${si+1}. ${escHtml(sg.title||'Song '+si)}</option>`
              ).join('')}
            </select>
          </div>

          <!-- DURATION -->
          <div class="form-group">
            <label>Duration (ms)</label>
            <input type="number" min="3000" max="30000" step="500"
              value="${s.dur||9000}"
              onchange="updateSlide(${i},'dur',+this.value)"/>
          </div>

          <!-- TINT -->
          <div class="form-group">
            <label>Tint / Overlay</label>
            <input type="text" value="${escAttr(s.tint||'rgba(0,0,0,0.28)')}"
              onchange="updateSlide(${i},'tint',this.value)"
              placeholder="rgba(r,g,b,a)"/>
          </div>

          <!-- LYRIC LINES -->
          <div class="form-group full">
            <label>Lyric Lines</label>
            <div class="lines-editor" id="lines-editor-${i}">
              ${renderLineRows(i, s.lines||[])}
            </div>
            <button class="add-line-btn" onclick="addLine(${i})">+ Add Line</button>
          </div>

        </div>
        <div class="form-footer">
          <button class="btn btn-danger" onclick="deleteSlide(${i})">Delete</button>
          ${i>0?`<button class="btn btn-ghost" style="padding:6px 14px;font-size:10px"
            onclick="moveSlide(${i},-1)">↑ Up</button>`:''}
          ${i<(data.slides.length-1)?`<button class="btn btn-ghost" style="padding:6px 14px;font-size:10px"
            onclick="moveSlide(${i},1)">↓ Down</button>`:''}
          <button class="btn btn-ghost" style="padding:6px 14px;font-size:10px"
            onclick="duplicateSlide(${i})">⧉ Duplicate</button>
        </div>
      </div>`;
    list.appendChild(card);
  });
}

function renderLineRows(slideIdx, lines) {
  return lines.map((ln, li) => `
    <div class="line-row" id="line-row-${slideIdx}-${li}">
      <input type="text" value="${escAttr(ln.text||'')}"
        oninput="updateLine(${slideIdx},${li},'text',this.value)"
        placeholder="Lyric text…"/>
      <select onchange="updateLine(${slideIdx},${li},'color',this.value)" title="Color">
        ${['','gold','rose','blue'].map(c=>
          `<option value="${c}" ${(ln.color||'')===c?'selected':''}>${c||'default'}</option>`
        ).join('')}
      </select>
      <select onchange="updateLine(${slideIdx},${li},'size',this.value)" title="Size">
        ${['','big','sm'].map(sz=>
          `<option value="${sz}" ${(ln.size||'')===sz?'selected':''}>${sz||'normal'}</option>`
        ).join('')}
      </select>
      <select onchange="updateLine(${slideIdx},${li},'style',this.value)" title="Style">
        ${['','caps','sm'].map(st=>
          `<option value="${st}" ${(ln.style||'')===st?'selected':''}>${st||'italic'}</option>`
        ).join('')}
      </select>
      <select onchange="updateLine(${slideIdx},${li},'delay',this.value)" title="Delay">
        ${[1,2,3,4].map(d=>
          `<option value="${d}" ${(ln.delay||1)==d?'selected':''}>d${d}</option>`
        ).join('')}
      </select>
      <button class="btn btn-danger" onclick="deleteLine(${slideIdx},${li})">✕</button>
    </div>`).join('');
}

// ── SLIDE ACTIONS ───────────────────────────
function updateSlide(i, key, val) {
  data.slides[i][key] = val;
  save();
  if (key === 'song') renderSlides(); // refresh song label in header
}

function updateLine(slideIdx, lineIdx, key, val) {
  if (!data.slides[slideIdx].lines) data.slides[slideIdx].lines = [];
  if (!data.slides[slideIdx].lines[lineIdx]) data.slides[slideIdx].lines[lineIdx] = {};
  data.slides[slideIdx].lines[lineIdx][key] = val;
  save();
}

function addLine(slideIdx) {
  if (!data.slides[slideIdx].lines) data.slides[slideIdx].lines = [];
  data.slides[slideIdx].lines.push({ text: '', delay: data.slides[slideIdx].lines.length + 1 });
  save();
  renderSlides();
  // Reopen the card
  setTimeout(() => {
    const card = document.querySelector(`[data-index="${slideIdx}"]`);
    if (card) card.classList.add('open');
  }, 10);
}

function deleteLine(slideIdx, lineIdx) {
  data.slides[slideIdx].lines.splice(lineIdx, 1);
  save();
  renderSlides();
  setTimeout(() => {
    const card = document.querySelector(`[data-index="${slideIdx}"]`);
    if (card) card.classList.add('open');
  }, 10);
}

function addSlide() {
  data.slides.push({
    img: 'https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1600&q=85',
    tint: 'rgba(5,5,20,0.35)', kenBurns: 'zoom-in',
    pos: 'pos-bc', song: 0, dur: 9000,
    lines: [{ text: 'New lyric line.', delay: 1, color: 'gold' }]
  });
  save(); renderSlides();
  toast('Slide added');
  setTimeout(() => {
    const cards = document.querySelectorAll('.slide-card');
    const last = cards[cards.length - 1];
    if (last) { last.classList.add('open'); last.scrollIntoView({ behavior:'smooth' }); }
  }, 50);
}

function deleteSlide(i) {
  if (!confirm(`Delete slide ${i+1}?`)) return;
  data.slides.splice(i, 1);
  save(); renderSlides(); toast('Slide deleted');
}

function moveSlide(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= data.slides.length) return;
  [data.slides[i], data.slides[j]] = [data.slides[j], data.slides[i]];
  save(); renderSlides(); toast(`Slide moved ${dir > 0 ? 'down' : 'up'}`);
}

function duplicateSlide(i) {
  const copy = JSON.parse(JSON.stringify(data.slides[i]));
  data.slides.splice(i + 1, 0, copy);
  save(); renderSlides(); toast('Slide duplicated');
}

// ── IMAGE UPLOAD ─────────────────────────────
function handleImgUpload(slideIdx, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    data.slides[slideIdx].img = dataUrl;
    save();
    // Update URL input display
    const urlInput = document.getElementById(`img-url-${slideIdx}`);
    if (urlInput) urlInput.value = '(local upload)';
    previewImg(slideIdx, dataUrl);
    toast('Image uploaded ✓');
  };
  reader.readAsDataURL(file);
}

function previewImg(slideIdx, src) {
  const prev = document.getElementById(`img-prev-${slideIdx}`);
  if (!prev) return;
  prev.src = src;
  if (src && src.length > 5) {
    prev.classList.add('show');
  } else {
    prev.classList.remove('show');
  }
}

// ══════════════════════════════════════════
// SONGS
// ══════════════════════════════════════════
function renderSongs() {
  const list = document.getElementById('songs-list');
  list.innerHTML = '';
  (data.songs || []).forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'song-card';
    card.innerHTML = `
      <div class="song-header">
        <div class="song-icon">♪</div>
        <div class="song-label">${escHtml(s.title || 'Song ' + (i+1))}</div>
        <div class="song-badge">Song ${i+1}</div>
        <button class="btn btn-danger" onclick="deleteSong(${i})">Remove</button>
      </div>
      <div class="form-grid">
        <div class="form-group full">
          <label>Song Title (shown in film strip)</label>
          <input type="text" value="${escAttr(s.title||'')}"
            oninput="updateSong(${i},'title',this.value)"/>
        </div>
        <div class="form-group">
          <label>YouTube Video ID</label>
          <input type="text" value="${escAttr(s.ytId||'')}"
            oninput="updateSong(${i},'ytId',this.value)"
            placeholder="e.g. N3vQBQ3XPCY"/>
        </div>
        <div class="form-group">
          <label>Start At (seconds)</label>
          <input type="number" min="0" max="600" value="${s.start||0}"
            onchange="updateSong(${i},'start',+this.value)"/>
        </div>
      </div>`;
    list.appendChild(card);
  });
}

function updateSong(i, key, val) {
  data.songs[i][key] = val;
  save();
}

function addSong() {
  data.songs.push({ title: 'New Song', ytId: '', start: 0 });
  save(); renderSongs(); renderSlides(); toast('Song added');
}

function deleteSong(i) {
  if (!confirm(`Remove Song ${i+1}? Slides using it will default to Song 0.`)) return;
  data.songs.splice(i, 1);
  // Clamp slide song indices
  data.slides.forEach(sl => {
    if (sl.song >= data.songs.length) sl.song = Math.max(0, data.songs.length - 1);
  });
  save(); renderSongs(); renderSlides(); toast('Song removed');
}

// ══════════════════════════════════════════
// END CARD
// ══════════════════════════════════════════
function renderEndCard() {
  const ec = data.endCard || {};
  setValue('ec-pre',   ec.pre   || '');
  setValue('ec-title', ec.title || '');
  setValue('ec-sub',   ec.sub   || '');
  setValue('ec-note',  ec.note  || '');
}

function updateEndCard(key, val) {
  if (!data.endCard) data.endCard = {};
  data.endCard[key] = val;
  save();
}

function setValue(id, val) {
  const el = document.getElementById(id);
  if (el) el.value = val;
}

// ══════════════════════════════════════════
// EXPORT
// ══════════════════════════════════════════
function getJSON() { return JSON.stringify(data, null, 2); }

function renderJSONPreview() {
  document.getElementById('json-preview').textContent = getJSON();
}

function downloadJSON() {
  const blob = new Blob([getJSON()], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'content.json';
  a.click();
  toast('Downloaded content.json ✓');
}

function copyJSON() {
  navigator.clipboard.writeText(getJSON())
    .then(() => toast('Copied to clipboard! ✓'))
    .catch(() => toast('Copy failed — try selecting manually'));
}

function resetData() {
  if (!confirm('Reset all data to defaults? This cannot be undone.')) return;
  localStorage.removeItem('forHerAdmin');
  data = getDefaultData();
  save(); renderAll(); toast('Reset to defaults');
}

function goExport() {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector('[onclick*="export"]').classList.add('active');
  document.getElementById('tab-export').classList.add('active');
  renderJSONPreview();
}

// ══════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════
function toggleCard(header) {
  header.parentElement.classList.toggle('open');
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'export') renderJSONPreview();
}

function previewSite() {
  window.open('index.html', '_blank');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(str) { return String(str).replace(/"/g,'&quot;'); }

function truncate(str, n) {
  return str.length > n ? str.slice(0, n) + '…' : str;
}

function firstLineText(slide) {
  return (slide.lines && slide.lines[0] && slide.lines[0].text)
    ? slide.lines[0].text
    : 'Slide';
}
