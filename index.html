<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Her</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,500&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#06050c;
  --warm:#f7f0e6;
  --amber:#e8a96a;
  --rose:#d4898a;
  --blue:#7aafd4;
  --fh:'Cormorant Garamond',serif;
  --fb:'DM Sans',sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);font-family:var(--fb);color:var(--warm);user-select:none;}

/* ── GRAIN ── */
#grain{position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.042;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:160px;animation:grn .5s steps(3) infinite;}
@keyframes grn{0%{transform:translate(0,0)}33%{transform:translate(-3%,2%)}66%{transform:translate(2%,-3%)}100%{transform:translate(-1%,1%)}}

/* ── VIGNETTE ── */
#vig{position:fixed;inset:0;z-index:9998;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 38%,rgba(6,5,12,.75) 100%);}

/* ── LOADER ── */
#loader{position:fixed;inset:0;z-index:8000;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity 1.2s ease,visibility 1.2s ease;}
#loader.gone{opacity:0;visibility:hidden;pointer-events:none;}
.ld-ring{width:36px;height:36px;border:1px solid rgba(232,169,106,.15);border-top-color:var(--amber);border-radius:50%;animation:spin 1.2s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-txt{font-family:var(--fb);font-weight:200;font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:rgba(232,169,106,.4);}

/* ── INTRO ── */
#intro{position:fixed;inset:0;z-index:5000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--ink);transition:opacity 2.5s ease,visibility 2.5s ease;}
#intro.gone{opacity:0;visibility:hidden;pointer-events:none;}

.i-eyebrow{font-family:var(--fb);font-weight:200;font-size:clamp(8px,1vw,10px);letter-spacing:.55em;text-transform:uppercase;color:var(--amber);opacity:0;animation:fadeUp 1.2s .3s forwards;}

.i-title{font-family:var(--fh);font-style:italic;font-weight:300;font-size:clamp(4rem,10vw,8.5rem);color:var(--warm);line-height:.95;text-align:center;opacity:0;animation:fadeUp 1.6s .7s forwards;margin:.6rem 0;}

.i-title .for{display:block;font-size:.42em;letter-spacing:.18em;font-style:normal;font-weight:300;color:rgba(247,240,230,.5);margin-bottom:.15em;}

.i-divider{display:flex;align-items:center;gap:16px;opacity:0;animation:fadeIn .8s 1.8s forwards;margin:1.6rem 0 1.4rem;}
.i-line{flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(232,169,106,.3),transparent);width:80px;}
.i-diamond{width:5px;height:5px;background:var(--amber);transform:rotate(45deg);}

.i-sub{font-family:var(--fb);font-weight:200;font-size:clamp(9px,1.1vw,11px);letter-spacing:.3em;text-transform:uppercase;color:rgba(247,240,230,.3);opacity:0;animation:fadeIn .8s 2s forwards;margin-bottom:3rem;}

.pbtn{position:relative;display:flex;align-items:center;gap:14px;padding:15px 42px;border:1px solid rgba(232,169,106,.25);background:transparent;border-radius:1px;cursor:pointer;color:var(--amber);font-family:var(--fb);font-weight:300;font-size:10px;letter-spacing:.38em;text-transform:uppercase;opacity:0;animation:fadeIn .8s 2.4s forwards;transition:all .6s ease;overflow:hidden;}
.pbtn::before{content:'';position:absolute;inset:0;background:rgba(232,169,106,.06);transform:scaleX(0);transform-origin:left;transition:transform .6s ease;}
.pbtn:hover::before{transform:scaleX(1);}
.pbtn:hover{letter-spacing:.44em;border-color:rgba(232,169,106,.5);}
.ptri{width:0;height:0;border-top:4px solid transparent;border-bottom:4px solid transparent;border-left:8px solid var(--amber);flex-shrink:0;}

/* ── PROGRESS ── */
#pw{position:fixed;top:0;left:0;right:0;z-index:4000;height:1px;background:rgba(247,240,230,.04);opacity:0;transition:opacity 1s;}
#pw.on{opacity:1;}
#pb{height:100%;width:0%;background:linear-gradient(to right,rgba(212,137,138,.6),var(--amber));box-shadow:0 0 8px rgba(232,169,106,.5);}

/* ── COUNTER ── */
#ctr{position:fixed;bottom:28px;right:32px;z-index:4000;font-family:var(--fb);font-weight:200;font-size:9px;letter-spacing:.25em;color:rgba(247,240,230,.18);opacity:0;transition:opacity 1s;}
#ctr.on{opacity:1;}

/* ── MUSIC BARS ── */
#mbars{position:fixed;bottom:28px;left:32px;z-index:4000;display:flex;align-items:flex-end;gap:3px;height:16px;opacity:0;transition:opacity .8s;}
#mbars.on{opacity:1;}
.mb{width:2px;border-radius:1px;background:rgba(232,169,106,.4);animation:mba 1s ease-in-out infinite alternate;}
.mb:nth-child(1){height:4px;animation-duration:.85s;}
.mb:nth-child(2){height:12px;animation-duration:1.1s;animation-delay:.12s;}
.mb:nth-child(3){height:7px;animation-duration:.75s;animation-delay:.28s;}
.mb:nth-child(4){height:14px;animation-duration:1.2s;animation-delay:.08s;}
.mb:nth-child(5){height:5px;animation-duration:.92s;animation-delay:.22s;}
@keyframes mba{from{transform:scaleY(.2)}to{transform:scaleY(1)}}

/* ── STAGE ── */
#stage{position:fixed;inset:0;z-index:1;}

/* ── SLIDE ── */
.slide{position:absolute;inset:0;opacity:0;transition:opacity 2s cubic-bezier(.4,0,.2,1);will-change:opacity;}
.slide.active{opacity:1;}

/* ── BG LAYER ── */
.sbg{position:absolute;inset:-12%;background-size:cover;background-position:center;will-change:transform;}
.kb-zi{animation:kbZI 22s ease-out forwards;}
.kb-zo{animation:kbZO 22s ease-out forwards;}
.kb-pr{animation:kbPR 22s ease-out forwards;}
.kb-pl{animation:kbPL 22s ease-out forwards;}
.kb-du{animation:kbDU 22s ease-out forwards;}
.kb-dr{animation:kbDR 22s ease-out forwards;}
@keyframes kbZI{from{transform:scale(1)}to{transform:scale(1.18)}}
@keyframes kbZO{from{transform:scale(1.18)}to{transform:scale(1)}}
@keyframes kbPR{from{transform:scale(1.1) translateX(-5%)}to{transform:scale(1.1) translateX(5%)}}
@keyframes kbPL{from{transform:scale(1.1) translateX(5%)}to{transform:scale(1.1) translateX(-5%)}}
@keyframes kbDU{from{transform:scale(1.08) translateY(-4%)}to{transform:scale(1.08) translateY(4%)}}
@keyframes kbDR{from{transform:scale(1.08) translateY(4%)}to{transform:scale(1.08) translateY(-4%)}}

/* ── OVERLAYS ── */
.sovl{position:absolute;inset:0;}
.stint{position:absolute;inset:0;mix-blend-mode:multiply;}

/* ── SPLIT OVERLAY (cinematic bars) ── */
.sbar-t{position:absolute;top:0;left:0;right:0;height:10%;background:linear-gradient(to bottom,rgba(6,5,12,.85),transparent);}
.sbar-b{position:absolute;bottom:0;left:0;right:0;height:25%;background:linear-gradient(to top,rgba(6,5,12,.92),rgba(6,5,12,.3) 60%,transparent);}
.sbar-l{position:absolute;top:0;bottom:0;left:0;width:8%;background:linear-gradient(to right,rgba(6,5,12,.5),transparent);}
.sbar-r{position:absolute;top:0;bottom:0;right:0;width:8%;background:linear-gradient(to left,rgba(6,5,12,.5),transparent);}

/* ── TEXT POSITIONS ── */
.lw{position:absolute;z-index:10;max-width:min(820px,88vw);}
.pos-bl{bottom:10%;left:7%;text-align:left;}
.pos-bc{bottom:10%;left:50%;transform:translateX(-50%);text-align:center;}
.pos-br{bottom:10%;right:7%;text-align:right;}
.pos-ml{top:50%;left:7%;transform:translateY(-50%);text-align:left;}
.pos-mc{top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.pos-tl{top:18%;left:7%;text-align:left;}
.pos-tc{top:18%;left:50%;transform:translateX(-50%);text-align:center;}
.pos-tr{top:18%;right:7%;text-align:right;}
.pos-fc{top:42%;left:50%;transform:translate(-50%,-50%);text-align:center;}

/* ── LYRIC LINE ── */
.ll{
  display:block;
  font-family:var(--fh);
  font-style:italic;
  font-weight:300;
  font-size:clamp(1.7rem,3.8vw,3.4rem);
  line-height:1.38;
  color:var(--warm);
  text-shadow:0 2px 60px rgba(0,0,0,.95),0 1px 12px rgba(0,0,0,.9);
  opacity:0;
  transform:translateY(22px) skewY(.5deg);
  transition:opacity 1.4s cubic-bezier(.25,.46,.45,.94),
             transform 1.4s cubic-bezier(.25,.46,.45,.94);
  will-change:opacity,transform;
}
.ll.in{opacity:1;transform:translateY(0) skewY(0);}
.ll.out{opacity:0;transform:translateY(-12px) skewY(-.3deg);transition:opacity .9s ease,transform .9s ease;}

/* Colors */
.ll.gold{color:var(--amber);}
.ll.rose{color:#eabcbc;}
.ll.blue{color:#a8d0e8;}
.ll.cream{color:#f7f0e6;}
.ll.dim{color:rgba(247,240,230,.55);}

/* Sizes */
.ll.hero{font-size:clamp(3rem,7.5vw,7rem);font-weight:400;line-height:1.05;letter-spacing:-.01em;}
.ll.big{font-size:clamp(2.2rem,5vw,5rem);font-weight:300;line-height:1.15;}
.ll.med{font-size:clamp(1.5rem,3vw,2.8rem);}
.ll.sm{font-size:clamp(1rem,1.8vw,1.6rem);font-style:normal;font-family:var(--fb);font-weight:200;letter-spacing:.04em;}
.ll.xs{font-size:clamp(.75rem,1.1vw,1rem);font-style:normal;font-family:var(--fb);font-weight:200;letter-spacing:.28em;text-transform:uppercase;}

/* Style mods */
.ll.upright{font-style:normal;}
.ll.tight{line-height:1.08;}
.ll.loose{line-height:1.7;}
.ll.wide{letter-spacing:.06em;}

/* Stagger delays */
.d0{transition-delay:.1s}
.d1{transition-delay:.4s}
.d2{transition-delay:.95s}
.d3{transition-delay:1.55s}
.d4{transition-delay:2.15s}
.d5{transition-delay:2.75s}

/* ── CHAPTER MARKER ── */
.chapter{position:absolute;top:32px;left:50%;transform:translateX(-50%);z-index:11;
  display:flex;align-items:center;gap:10px;
  font-family:var(--fb);font-weight:200;font-size:9px;letter-spacing:.5em;text-transform:uppercase;
  color:rgba(232,169,106,.0);transition:color 1.8s ease 1s;}
.slide.active .chapter{color:rgba(232,169,106,.45);}
.chapter-line{width:28px;height:1px;background:currentColor;}

/* ── SCENE NUMBER ── */
.scene-n{position:absolute;top:32px;right:7%;z-index:11;
  font-family:var(--fh);font-style:italic;font-size:clamp(3.5rem,6vw,5.5rem);font-weight:300;
  color:rgba(247,240,230,.04);line-height:1;user-select:none;}

/* ── END CARD ── */
#ec{position:fixed;inset:0;z-index:4500;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--ink);opacity:0;pointer-events:none;transition:opacity 3s ease;}
#ec.on{opacity:1;pointer-events:all;}

.ec-wrap{text-align:center;padding:0 24px;}

.ec-pre{font-family:var(--fb);font-weight:200;font-size:9px;letter-spacing:.55em;text-transform:uppercase;color:var(--amber);opacity:0;}
#ec.on .ec-pre{animation:fadeUp 1.4s .4s forwards;}

.ec-name{font-family:var(--fh);font-style:italic;font-weight:300;font-size:clamp(3.5rem,9vw,8rem);color:var(--warm);line-height:1;margin:.6rem 0 .3rem;opacity:0;}
#ec.on .ec-name{animation:fadeUp 1.8s .9s forwards;}

.ec-year{font-family:var(--fh);font-style:italic;font-weight:300;font-size:clamp(1rem,2.5vw,1.8rem);color:var(--amber);opacity:0;}
#ec.on .ec-year{animation:fadeUp 1.4s 1.5s forwards;}

.ec-ornament{display:flex;align-items:center;justify-content:center;gap:14px;margin:2.2rem auto;opacity:0;}
#ec.on .ec-ornament{animation:fadeIn .8s 2.2s forwards;}
.ec-orn-line{width:60px;height:1px;background:linear-gradient(to right,transparent,rgba(232,169,106,.4));}
.ec-orn-line.r{background:linear-gradient(to left,transparent,rgba(232,169,106,.4));}
.ec-orn-diamond{width:5px;height:5px;background:var(--amber);transform:rotate(45deg);}

.ec-msg{font-family:var(--fh);font-style:italic;font-weight:300;font-size:clamp(1.1rem,2.2vw,1.7rem);color:rgba(247,240,230,.6);line-height:1.7;max-width:480px;margin:0 auto;opacity:0;}
#ec.on .ec-msg{animation:fadeIn 1.4s 2.6s forwards;}

.ec-note{font-family:var(--fb);font-weight:200;font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:rgba(247,240,230,.18);margin-top:2.8rem;opacity:0;}
#ec.on .ec-note{animation:fadeIn .8s 3.4s forwards;}

.rbtn{margin-top:2rem;padding:12px 36px;background:transparent;border:1px solid rgba(232,169,106,.18);color:rgba(232,169,106,.4);font-family:var(--fb);font-weight:200;font-size:9px;letter-spacing:.32em;text-transform:uppercase;cursor:pointer;border-radius:1px;transition:all .5s;opacity:0;}
#ec.on .rbtn{animation:fadeIn .8s 4s forwards;}
.rbtn:hover{border-color:var(--amber);color:var(--amber);}

/* ── TRANSITION FLASH ── */
#flash{position:fixed;inset:0;z-index:3000;background:var(--ink);opacity:0;pointer-events:none;transition:opacity .3s ease;}
#flash.on{opacity:.18;}

/* ── KEYFRAMES ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── MOBILE ── */
@media(max-width:640px){
  .pos-bl,.pos-br{left:6%;right:6%;bottom:12%;text-align:center;transform:none;}
  .pos-ml{left:6%;right:6%;text-align:center;transform:translateY(-50%);}
  .pos-tl,.pos-tr{left:6%;right:6%;text-align:center;transform:none;}
  .pos-tr{right:6%;}
  #ctr{right:18px;bottom:20px;}
  #mbars{left:18px;bottom:20px;}
  .scene-n{display:none;}
  .ll.hero{font-size:clamp(2.6rem,11vw,5rem);}
  .ll.big{font-size:clamp(1.9rem,7vw,3.5rem);}
}
</style>
</head>

<div id="flash"></div>

</div>

    <div class="i-line"></div>
  </div>
  <p class="i-sub">Press play &nbsp;·&nbsp; Turn the volume up</p>
  <button class="pbtn" id="playBtn">
    <span class="ptri"></span>
    Begin
  </button>
</div>

<!-- PROGRESS -->
<div id="pw"><div id="pb"></div></div>

<!-- COUNTER -->
<div id="ctr"></div>

<!-- MUSIC BARS -->
<div id="mbars">

  <div class="mb"></div><div class="mb"></div>
</div>

<!-- END CARD -->
<div id="ec">

    <p class="ec-pre" id="ec-pre">With love, always</p>
    <p class="ec-name" id="ec-name">Happy Birthday.</p>

</div>

const DEFAULT_END = {
  pre  : "With love, always",
  title: "Happy Birthday.",
  year : "You deserve the whole world.",
  msg  : "Every song, every frame —\nmade only for you.",
  note : "Kasoor · Baarishein · Tum Hi Ho · Tera Yaar Hoon Main · Khairiyat"

/* ════════════════════════════════════════════
   STATE
════════════════════════════════════════════ */
let SONGS  = [...DEFAULT_SONGS];
let SLIDES = DEFAULT_SLIDES;
let cur       = -1;
let stTimer   = null;
let running   = false;
let activeSng = -1;
let players   = {};
let plReady   = {};
let plPending = -1;

const $stage  = document.getElementById('stage');
const $pb     = document.getElementById('pb');
const $pw     = document.getElementById('pw');
const $ctr    = document.getElementById('ctr');
const $mbars  = document.getElementById('mbars');
const $intro  = document.getElementById('intro');
const $ec     = document.getElementById('ec');
const $loader = document.getElementById('loader');
const $flash  = document.getElementById('flash');

/* ════════════════════════════════════════════
   LOAD DATA
════════════════════════════════════════════ */
async function loadData() {
  let data = null;
  try {
    const saved = localStorage.getItem('forHerAdmin');
    if (saved) data = JSON.parse(saved);
  } catch {}
  if (!data) {
    try {
      const r = await fetch('content.json?' + Date.now());
      if (r.ok) data = await r.json();
    } catch {}
  }
  if (!data) return;

  if (data.songs  && data.songs.length)  SONGS  = data.songs;
  if (data.slides && data.slides.length) SLIDES = normaliseSlides(data.slides);

  const ec = data.endCard || {};
  setTxt('ec-pre',  ec.pre   || DEFAULT_END.pre);
  setTxt('ec-name', ec.title || DEFAULT_END.title);
  setTxt('ec-year', ec.year  || ec.sub || DEFAULT_END.year);
  setTxt('ec-msg',  ec.msg   || DEFAULT_END.msg);
  setTxt('ec-note', ec.note  || DEFAULT_END.note);
}

function normaliseSlides(raw) {
  const kbMap = {'zoom-in':'kb-zi','zoom-out':'kb-zo','pan-right':'kb-pr','pan-left':'kb-pl','drift-up':'kb-du','drift-down':'kb-dr'};
  return raw.map(s => ({
    img    : s.img || s.image || '',
    sovl   : s.sovl || 'linear-gradient(to top,rgba(6,5,12,.9) 0%,rgba(6,5,12,.1) 65%,transparent 100%)',
    tint   : s.tint || s.overlay || 'rgba(0,0,0,0.28)',
    kb     : kbMap[s.kenBurns] || s.kb || 'kb-zi',
    pos    : s.pos || 'pos-bc',
    song   : typeof s.song === 'number' ? s.song : 0,
    dur    : s.dur || (s.duration ? s.duration * 1000 : 9000),
    chapter: s.chapter || '',
    lines  : (s.lines || []).map(ln => {
      if (ln.cls !== undefined) return ln;
      const p = [];
      if (ln.delay) p.push(`d${ln.delay}`);
      if (ln.color) p.push(ln.color);
      if (ln.size)  p.push(ln.size);
      if (ln.style) p.push(ln.style);
      return { text: ln.text || '', cls: p.join(' ') };
    })
  }));
}

function setTxt(id, txt) {
  const el = document.getElementById(id);
  if (el) el.textContent = txt;
}

/* ════════════════════════════════════════════
   BUILD SLIDES
════════════════════════════════════════════ */
function buildSlides() {
  $stage.innerHTML = '';
  SLIDES.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'slide'; d.id = `sl-${i}`;

    const chapterHTML = s.chapter
      ? `<div class="chapter"><div class="chapter-line"></div>${s.chapter}<div class="chapter-line"></div></div>`
      : '';

    d.innerHTML = `
      <div class="sbg ${s.kb}" style="background-image:url('${cssEsc(s.img)}')"></div>
      <div class="sovl" style="background:${cssEsc(s.sovl)}"></div>
      <div class="stint" style="background:${cssEsc(s.tint)}"></div>
      <div class="sbar-t"></div>
      <div class="sbar-b"></div>
      <div class="sbar-l"></div>
      <div class="sbar-r"></div>
      ${chapterHTML}
      <div class="scene-n">${String(i+1).padStart(2,'0')}</div>
      <div class="lw ${s.pos}">
        ${(s.lines||[]).map(l=>`<span class="ll ${l.cls||''}">${escHtml(l.text)}</span>`).join('')}
      </div>`;
    $stage.appendChild(d);
  });
}

/* ════════════════════════════════════════════
   YOUTUBE
════════════════════════════════════════════ */
function loadYT() {
  const t = document.createElement('script');
  t.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(t);
}

window.onYouTubeIframeAPIReady = function() {
  SONGS.forEach((song, i) => {
    const wrap = document.createElement('div');
    wrap.id = `yt-wrap-${i}`;
    wrap.style.cssText = 'position:fixed;top:-200px;left:-200px;width:160px;height:90px;opacity:0;pointer-events:none;';
    document.body.appendChild(wrap);

    players[i] = new YT.Player(`yt-wrap-${i}`, {
      width:'160', height:'90',
      videoId: song.ytId,
      playerVars:{
        autoplay:1, mute:1, start:song.start||0,
        controls:0, disablekb:1, fs:0,
        modestbranding:1, rel:0, playsinline:1, enablejsapi:1
      },
      events:{
        onReady      : e => onReady(e, i),
        onStateChange: e => onStateChange(e, i),
        onError      : e => console.warn(`YT err song ${i}:`, e.data)
      }
    });
  });
};

function onReady(event, idx) {
  plReady[idx] = true;
  try { event.target.pauseVideo(); event.target.setVolume(0); } catch {}
  if (plPending === idx && running) doPlaySong(idx);
}

function onStateChange(event, idx) {
  if (event.data === YT.PlayerState.ENDED) {
    try { event.target.seekTo(SONGS[idx].start||0,true); event.target.playVideo(); } catch {}
  }
}

function doPlaySong(idx) {
  if (!plReady[idx] || !players[idx]) return;
  try {
    const p = players[idx];
    p.unMute();
    p.seekTo(SONGS[idx].start||0, true);
    p.playVideo();
    smoothVol(p, 0, 82, 2800);
  } catch(e) { console.warn('doPlaySong', e); }
}

function switchSong(idx) {
  if (idx === activeSng) return;
  activeSng = idx;

  SONGS.forEach((_, i) => {
    if (i !== idx && players[i] && plReady[i]) {
      smoothVol(players[i], null, 0, 1200, () => {
        try { players[i].pauseVideo(); } catch {}
      });
    }
  });

  plPending = idx;
  if (plReady[idx]) doPlaySong(idx);
}

function smoothVol(player, from, to, ms, cb) {
  let vol = from;
  if (vol === null) { try { vol = player.getVolume(); } catch { vol = to > 0 ? 0 : 82; } }
  const STEPS = 28, ivms = ms / STEPS, delta = (to - vol) / STEPS;
  let n = 0;
  try { player.unMute(); } catch {}
  const iv = setInterval(() => {
    n++; vol = Math.max(0, Math.min(100, vol + delta));
    try { player.setVolume(Math.round(vol)); } catch {}
    if (n >= STEPS) {
      clearInterval(iv);
      try { player.setVolume(to); } catch {}
      if (cb) cb();
    }
  }, ivms);
}

/* ════════════════════════════════════════════
   SLIDE ENGINE
════════════════════════════════════════════ */
function goSlide(idx) {
  if (idx >= SLIDES.length) { showEnd(); return; }

  const prev = cur; cur = idx;

  /* Flash transition */
  $flash.classList.add('on');
  setTimeout(() => $flash.classList.remove('on'), 300);

  /* Deactivate previous */
  if (prev >= 0) {
    const pe = document.getElementById(`sl-${prev}`);
    if (pe) {
      pe.querySelectorAll('.ll').forEach(l => { l.classList.remove('in'); l.classList.add('out'); });
      setTimeout(() => pe.classList.remove('active'), 2000);
    }
  }

  /* Activate */
  const el = document.getElementById(`sl-${idx}`);
  const ob = el.querySelector('.sbg');
  const nb = document.createElement('div');
  nb.className = ob.className; nb.style.cssText = ob.style.cssText;
  ob.parentNode.replaceChild(nb, ob);
  el.classList.add('active');

  /* Lyrics */
  const lls = el.querySelectorAll('.ll');
  lls.forEach(l => l.classList.remove('out'));
  requestAnimationFrame(() => requestAnimationFrame(() => lls.forEach(l => l.classList.add('in'))));

  /* Progress */
  const dur = SLIDES[idx].dur;
  $pb.style.transition = 'none'; $pb.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    $pb.style.transition = `width ${dur/1000}s linear`;
    $pb.style.width = '100%';
  }));

  /* Counter */
  $ctr.textContent = `${String(idx+1).padStart(2,'0')} / ${String(SLIDES.length).padStart(2,'0')}`;

  /* Song */
  const sng = SLIDES[idx].song || 0;
  if (sng !== activeSng) switchSong(sng);

  /* Next */
  clearTimeout(stTimer);
  stTimer = setTimeout(() => goSlide(cur+1), dur);
}

/* ════════════════════════════════════════════
   START / END / REPLAY
════════════════════════════════════════════ */
function start() {
  $intro.classList.add('gone');
  [$pw,$ctr,$mbars].forEach(e => e.classList.add('on'));
  running = true;

  if (plReady[0] && players[0]) {
    doPlaySong(0); activeSng = 0; plPending = 0;
  } else {
    plPending = 0; activeSng = 0;
  }
  setTimeout(() => goSlide(0), 1800);
}

function showEnd() {
  running = false; $pb.style.width = '100%';
  SONGS.forEach((_,i) => {
    if (players[i] && plReady[i]) {
      smoothVol(players[i], null, 0, 2500, () => {
        try { players[i].pauseVideo(); } catch {}
      });
    }
  });
  setTimeout(() => $ec.classList.add('on'), 2200);
}

function replay() {
  $ec.classList.remove('on');
  cur = -1; activeSng = -1; plPending = -1;
  document.querySelectorAll('.slide').forEach(s => {
    s.classList.remove('active');
    s.querySelectorAll('.ll').forEach(l => l.classList.remove('in','out'));
  });
  running = true;
  if (plReady[0] && players[0]) {
    doPlaySong(0); activeSng = 0; plPending = 0;
  } else { plPending = 0; activeSng = 0; }
  setTimeout(() => goSlide(0), 900);
}

/* ════════════════════════════════════════════
   KEYBOARD
════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (!running) return;
  if (e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); clearTimeout(stTimer); goSlide(cur+1); }
  if (e.key==='ArrowLeft')               { e.preventDefault(); clearTimeout(stTimer); goSlide(Math.max(0,cur-1)); }
});

/* ════════════════════════════════════════════
   STORAGE SYNC
════════════════════════════════════════════ */
window.addEventListener('storage', async e => {
  if (e.key === 'forHerAdmin') {
    await loadData(); buildSlides();
    cur = -1; activeSng = -1; plPending = -1; running = false;
    $ec.classList.remove('on'); $intro.classList.remove('gone');
    [$pw,$ctr,$mbars].forEach(el => el.classList.remove('on'));
  }
});

/* ════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════ */
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function cssEsc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

/* ════════════════════════════════════════════
   INIT
════════════════════════════════════════════ */
async function init() {
  await loadData();
  buildSlides();
  loadYT();
  $loader.classList.add('gone');
  document.getElementById('playBtn').addEventListener('click', start);
  document.getElementById('replayBtn').addEventListener('click', replay);
}

init();
</script>
</body>
</html>
