<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For Her</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,300;1,400;1,500&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #080610;
      --warm: #f5ede0;
      --amber: #e8a96a;
      --rose: #e8a0a2;
      --blue: #8ac4e0;
      --ph: 'Playfair Display', serif;
      --fb: 'Jost', sans-serif;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--ink); font-family: var(--fb); color: var(--warm); -webkit-font-smoothing: antialiased; }

    #grain { position: fixed; inset: 0; z-index: 9999; pointer-events: none; opacity: .05; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size: 180px; }

    #vig { position: fixed; inset: 0; z-index: 9998; pointer-events: none; background: radial-gradient(ellipse at center, transparent 30%, rgba(8,6,16,.8) 100%); }

    #loader { position: fixed; inset: 0; z-index: 8000; background: var(--ink); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; }
    #loader.gone { opacity: 0; visibility: hidden; pointer-events: none; }
    .ld-petal { display: flex; gap: 5px; align-items: flex-end; }
    .ld-petal span { width: 2px; border-radius: 2px; background: rgba(232,169,106,.4); animation: petalanim 1.1s ease-in-out infinite alternate; }
    .ld-petal span:nth-child(1) { height: 6px; animation-delay: .0s; }
    .ld-petal span:nth-child(2) { height: 14px; animation-delay: .15s; }
    .ld-petal span:nth-child(3) { height: 10px; animation-delay: .3s; }
    .ld-petal span:nth-child(4) { height: 16px; animation-delay: .1s; }
    .ld-petal span:nth-child(5) { height: 8px; animation-delay: .25s; }
    @keyframes petalanim { from { transform: scaleY(.2); opacity: .2; } to { transform: scaleY(1); opacity: 1; } }
    .ld-txt { font-weight: 200; font-size: 9px; letter-spacing: .55em; text-transform: uppercase; color: rgba(232,169,106,.3); }

    #intro { position: fixed; inset: 0; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--ink); transition: opacity 3s ease; }
    #intro.gone { opacity: 0; visibility: hidden; pointer-events: none; }
    .i-title { font-family: var(--ph); font-style: italic; font-size: clamp(4rem, 11vw, 8rem); color: var(--warm); line-height: .95; text-align: center; margin-bottom: 2rem; }
    .pbtn { padding: 14px 44px; border: 1px solid rgba(232,169,106,.3); background: transparent; color: rgba(232,169,106,.7); font-family: var(--fb); cursor: pointer; font-size: 10px; letter-spacing: .3em; text-transform: uppercase; transition: all .5s; }
    .pbtn:hover { border-color: var(--amber); color: var(--amber); }

    #pw { position: fixed; top: 0; left: 0; right: 0; z-index: 4000; height: 1px; background: rgba(245,237,224,.04); opacity: 0; }
    #pw.on { opacity: 1; }
    #pb { height: 100%; background: linear-gradient(to right, rgba(232,160,162,.5), var(--amber)); width: 0%; }

    #ctr { position: fixed; bottom: 26px; right: 28px; z-index: 4000; font-size: 8px; color: rgba(245,237,224,.15); opacity: 0; }
    #ctr.on { opacity: 1; }

    #mbars { position: fixed; bottom: 24px; left: 28px; z-index: 4000; display: flex; gap: 3px; height: 14px; opacity: 0; }
    #mbars.on { opacity: 1; }
    .mb { width: 2px; background: rgba(232,169,106,.35); border-radius: 1px; animation: mba 1s ease-in-out infinite alternate; }
    .mb:nth-child(1) { height: 4px; animation-duration: .82s; }
    .mb:nth-child(2) { height: 10px; animation-delay: .1s; animation-duration: 1.05s; }
    .mb:nth-child(3) { height: 6px; animation-delay: .22s; animation-duration: .7s; }
    @keyframes mba { from { transform: scaleY(.15); } to { transform: scaleY(1); } }

    #stage { position: fixed; inset: 0; z-index: 1; }
    .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 2.2s cubic-bezier(.4,0,.2,1); }
    .slide.active { opacity: 1; }
    .sbg { position: absolute; inset: -12%; background-size: cover; background-position: center; }
    .kb-zi { animation: kbZI 22s ease-out forwards; }
    .kb-zo { animation: kbZO 22s ease-out forwards; }
    .kb-pr { animation: kbPR 22s ease-out forwards; }
    .kb-pl { animation: kbPL 22s ease-out forwards; }
    @keyframes kbZI { from { transform: scale(1); } to { transform: scale(1.15); } }
    @keyframes kbZO { from { transform: scale(1.15); } to { transform: scale(1); } }
    @keyframes kbPR { from { transform: scale(1.1) translateX(-3%); } to { transform: scale(1.1) translateX(3%); } }
    @keyframes kbPL { from { transform: scale(1.1) translateX(3%); } to { transform: scale(1.1) translateX(-3%); } }

    .stint { position: absolute; inset: 0; mix-blend-mode: multiply; }
    .sbar-b { position: absolute; bottom: 0; left: 0; right: 0; height: 30%; background: linear-gradient(to top, rgba(8,6,16,.95), transparent); }

    .lw { position: absolute; bottom: 11%; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; max-width: 80%; }
    .ll { display: block; font-family: var(--ph); font-style: italic; font-size: clamp(1.8rem, 4vw, 3.5rem); color: var(--warm); text-shadow: 0 2px 80px rgba(0,0,0,.95); opacity: 0; transform: translateY(20px); transition: opacity 1.5s cubic-bezier(.25,.46,.45,.94), transform 1.5s cubic-bezier(.25,.46,.45,.94); line-height: 1.4; }
    .ll.in { opacity: 1; transform: translateY(0); }
    .ll.gold { color: var(--amber); }
    .ll.rose { color: #f0b8b8; }
    .ll.blue { color: #aad4eb; }
    .ll.big { font-size: clamp(2rem, 6vw, 5rem); }
    .d1 { transition-delay: .35s; }
    .d2 { transition-delay: .9s; }
    .d3 { transition-delay: 1.5s; }

    #ec { position: fixed; inset: 0; z-index: 4500; display: flex; align-items: center; justify-content: center; background: var(--ink); opacity: 0; pointer-events: none; transition: opacity 3s ease; }
    #ec.on { opacity: 1; pointer-events: all; }
    .ec-name { font-family: var(--ph); font-style: italic; font-size: clamp(3rem, 10vw, 8rem); color: var(--warm); margin-bottom: 1rem; opacity: 0; animation: riseIn 1.8s 1s forwards; }
    .ec-msg { font-size: clamp(1rem, 2vw, 1.4rem); color: rgba(245,237,224,.5); line-height: 1.8; opacity: 0; animation: fadeIn 1.2s 2s forwards; }
    @keyframes riseIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .rbtn { margin-top: 2rem; padding: 12px 40px; border: 1px solid rgba(232,169,106,.2); background: transparent; color: rgba(232,169,106,.4); cursor: pointer; font-family: var(--fb); font-size: 9px; letter-spacing: .3em; text-transform: uppercase; transition: all .5s; opacity: 0; animation: fadeIn .8s 3s forwards; }
    .rbtn:hover { border-color: var(--amber); color: var(--amber); }

    @media(max-width: 640px) {
      .lw { left: 6%; right: 6%; transform: none; }
      #ctr { right: 12px; bottom: 16px; }
      #mbars { left: 12px; }
    }
  </style>
</head>
<body>

<div id="grain"></div>
<div id="vig"></div>

<div id="loader">
  <div class="ld-petal">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <span class="ld-txt">Synchronizing...</span>
</div>

<div id="intro">
  <h1 class="i-title">For <span id="intro-name">Her</span></h1>
  <button class="pbtn" id="playBtn">▶ Begin</button>
</div>

<div id="pw"><div id="pb"></div></div>
<div id="ctr"></div>
<div id="mbars">
  <div class="mb"></div><div class="mb"></div><div class="mb"></div>
</div>

<div id="stage"></div>

<div id="ec" style="flex-direction: column; text-align: center; padding: 40px;">
  <p class="ec-name" id="ec-name">Happy Birthday</p>
  <p class="ec-msg" id="ec-msg">Every song, every frame — made only for you</p>
  <button class="rbtn" id="replayBtn">Watch Again</button>
</div>

<script src="viewer-client.js"></script>
</body>
</html>
