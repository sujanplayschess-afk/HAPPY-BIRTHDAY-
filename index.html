<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Her</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,300;1,400;1,500&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#080610;
  --warm:#f5ede0;
  --amber:#e8a96a;
  --rose:#e8a0a2;
  --blue:#8ac4e0;
  --cream:#f5ede0;
  --ph:'Playfair Display',serif;
  --fb:'Jost',sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);font-family:var(--fb);color:var(--warm);-webkit-font-smoothing:antialiased;}

/* GRAIN */
#grain{position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.05;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px;animation:grn .4s steps(3) infinite;}
@keyframes grn{0%{transform:translate(0,0)}33%{transform:translate(-2%,2%)}66%{transform:translate(2%,-2%)}100%{transform:translate(-1%,1%)}}

/* VIGNETTE */
#vig{position:fixed;inset:0;z-index:9998;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 30%,rgba(8,6,16,.8) 100%);}

/* LOADER */
#loader{position:fixed;inset:0;z-index:8000;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity 1.2s ease,visibility 1.2s ease;}
#loader.gone{opacity:0;visibility:hidden;pointer-events:none;}
.ld-petal{display:flex;gap:5px;align-items:flex-end;}
.ld-petal span{width:2px;border-radius:2px;background:rgba(232,169,106,.4);animation:petalanim 1.1s ease-in-out infinite alternate;}
.ld-petal span:nth-child(1){height:6px;animation-delay:.0s;}
.ld-petal span:nth-child(2){height:14px;animation-delay:.15s;}
.ld-petal span:nth-child(3){height:10px;animation-delay:.3s;}
.ld-petal span:nth-child(4){height:16px;animation-delay:.1s;}
.ld-petal span:nth-child(5){height:8px;animation-delay:.25s;}
@keyframes petalanim{from{transform:scaleY(.2);opacity:.2}to{transform:scaleY(1);opacity:1}}
.ld-txt{font-weight:200;font-size:9px;letter-spacing:.55em;text-transform:uppercase;color:rgba(232,169,106,.3);}

/* INTRO */
#intro{position:fixed;inset:0;z-index:5000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--ink);transition:opacity 3s ease,visibility 3s ease;}
#intro.gone{opacity:0;visibility:hidden;pointer-events:none;}

.i-small{font-weight:200;font-size:9px;letter-spacing:.6em;text-transform:uppercase;color:rgba(232,169,106,.5);opacity:0;animation:riseIn 1.2s .3s forwards;}

.i-title{font-family:var(--ph);font-style:italic;font-weight:400;font-size:clamp(4.5rem,11vw,9rem);color:var(--warm);line-height:.9;text-align:center;opacity:0;animation:riseIn 1.8s .8s forwards;margin:.8rem 0 .2rem;}

.i-title .for-word{display:block;font-size:.35em;font-style:normal;font-weight:200;font-family:var(--fb);letter-spacing:.6em;text-transform:uppercase;color:rgba(245,237,224,.35);margin-bottom:.3em;}

.i-ornament{display:flex;align-items:center;gap:16px;opacity:0;animation:fadeIn .8s 2s forwards;margin:1.8rem 0 1.5rem;}
.i-orn-l{width:90px;height:1px;background:linear-gradient(to right,transparent,rgba(232,169,106,.25));}
.i-orn-r{width:90px;height:1px;background:linear-gradient(to left,transparent,rgba(232,169,106,.25));}
.i-orn-c{display:flex;gap:5px;align-items:center;}
.i-dot{width:3px;height:3px;background:var(--amber);border-radius:50%;}
.i-dot.big{width:5px;height:5px;}

.i-sub{font-weight:200;font-size:9px;letter-spacing:.32em;text-transform:uppercase;color:rgba(245,237,224,.22);opacity:0;animation:fadeIn .8s 2.2s forwards;margin-bottom:3.5rem;}

.pbtn{position:relative;display:flex;align-items:center;gap:16px;padding:16px 50px;background:transparent;border:1px solid rgba(232,169,106,.2);border-radius:1px;cursor:pointer;color:rgba(232,169,106,.7);font-family:var(--fb);font-weight:200;font-size:9px;letter-spacing:.42em;text-transform:uppercase;opacity:0;animation:fadeIn .8s 2.6s forwards;transition:all .7s ease;overflow:hidden;}
.pbtn::before{content:'';position:absolute;inset:0;background:rgba(232,169,106,.05);transform:scaleX(0);transform-origin:left;transition:transform .7s ease;}
.pbtn:hover::before{transform:scaleX(1);}
.pbtn:hover{color:var(--amber);border-color:rgba(232,169,106,.45);letter-spacing:.5em;}
.pbtn-icon{width:0;height:0;border-top:4px solid transparent;border-bottom:4px solid transparent;border-left:7px solid currentColor;flex-shrink:0;}

/* PROGRESS */
#pw{position:fixed;top:0;left:0;right:0;z-index:4000;height:1px;background:rgba(245,237,224,.04);opacity:0;transition:opacity 1s;}
#pw.on{opacity:1;}
#pb{height:100%;width:0%;background:linear-gradient(to right,rgba(232,160,162,.5),var(--amber));box-shadow:0 0 6px rgba(232,169,106,.4);}

/* COUNTER */
#ctr{position:fixed;bottom:26px;right:28px;z-index:4000;font-weight:200;font-size:8px;letter-spacing:.3em;color:rgba(245,237,224,.15);opacity:0;transition:opacity 1s;}
#ctr.on{opacity:1;}

/* MUSIC VIZ */
#mbars{position:fixed;bottom:24px;left:28px;z-index:4000;display:flex;align-items:flex-end;gap:3px;height:14px;opacity:0;transition:opacity .8s;}
#mbars.on{opacity:1;}
.mb{width:2px;border-radius:1px;background:rgba(232,169,106,.35);animation:mba 1s ease-in-out infinite alternate;}
.mb:nth-child(1){height:4px;animation-duration:.82s;}
.mb:nth-child(2){height:10px;animation-duration:1.05s;animation-delay:.1s;}
.mb:nth-child(3){height:6px;animation-duration:.7s;animation-delay:.22s;}
.mb:nth-child(4){height:13px;animation-duration:1.18s;animation-delay:.06s;}
.mb:nth-child(5){height:4px;animation-duration:.9s;animation-delay:.18s;}
@keyframes mba{from{transform:scaleY(.15)}to{transform:scaleY(1)}}

/* STAGE */
#stage{position:fixed;inset:0;z-index:1;}

/* SLIDE */
.slide{position:absolute;inset:0;opacity:0;transition:opacity 2.2s cubic-bezier(.4,0,.2,1);will-change:opacity;}
.slide.active{opacity:1;}

/* BG */
.sbg{position:absolute;inset:-12%;background-size:cover;background-position:center;will-change:transform;}
.kb-zi{animation:kbZI 24s ease-out forwards;}
.kb-zo{animation:kbZO 24s ease-out forwards;}
.kb-pr{animation:kbPR 24s ease-out forwards;}
.kb-pl{animation:kbPL 24s ease-out forwards;}
.kb-du{animation:kbDU 24s ease-out forwards;}
.kb-dr{animation:kbDR 24s ease-out forwards;}
@keyframes kbZI{from{transform:scale(1)}to{transform:scale(1.16)}}
@keyframes kbZO{from{transform:scale(1.16)}to{transform:scale(1)}}
@keyframes kbPR{from{transform:scale(1.1) translateX(-4%)}to{transform:scale(1.1) translateX(4%)}}
@keyframes kbPL{from{transform:scale(1.1) translateX(4%)}to{transform:scale(1.1) translateX(-4%)}}
@keyframes kbDU{from{transform:scale(1.08) translateY(-3%)}to{transform:scale(1.08) translateY(3%)}}
@keyframes kbDR{from{transform:scale(1.08) translateY(3%)}to{transform:scale(1.08) translateY(-3%)}}

/* OVERLAYS */
.sovl{position:absolute;inset:0;}
.stint{position:absolute;inset:0;mix-blend-mode:multiply;}
.sbar-t{position:absolute;top:0;left:0;right:0;height:12%;background:linear-gradient(to bottom,rgba(8,6,16,.8),transparent);}
.sbar-b{position:absolute;bottom:0;left:0;right:0;height:28%;background:linear-gradient(to top,rgba(8,6,16,.95),rgba(8,6,16,.35) 60%,transparent);}
.sbar-l{position:absolute;top:0;bottom:0;left:0;width:8%;background:linear-gradient(to right,rgba(8,6,16,.45),transparent);}
.sbar-r{position:absolute;top:0;bottom:0;right:0;width:8%;background:linear-gradient(to left,rgba(8,6,16,.45),transparent);}

/* TEXT POSITIONS */
.lw{position:absolute;z-index:10;max-width:min(860px,88vw);}
.pos-bl{bottom:11%;left:7%;text-align:left;}
.pos-bc{bottom:11%;left:50%;transform:translateX(-50%);text-align:center;}
.pos-br{bottom:11%;right:7%;text-align:right;}
.pos-ml{top:50%;left:7%;transform:translateY(-50%);text-align:left;}
.pos-mc{top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.pos-tl{top:18%;left:7%;text-align:left;}
.pos-tc{top:18%;left:50%;transform:translateX(-50%);text-align:center;}
.pos-tr{top:18%;right:7%;text-align:right;}
.pos-fc{top:44%;left:50%;transform:translate(-50%,-50%);text-align:center;}

/* LYRIC LINE */
.ll{
  display:block;
  font-family:var(--ph);
  font-style:italic;
  font-weight:400;
  font-size:clamp(1.6rem,3.6vw,3.2rem);
  line-height:1.4;
  color:var(--warm);
  text-shadow:0 2px 80px rgba(0,0,0,1),0 1px 16px rgba(0,0,0,.9);
  opacity:0;
  transform:translateY(24px);
  transition:opacity 1.5s cubic-bezier(.25,.46,.45,.94),transform 1.5s cubic-bezier(.25,.46,.45,.94);
  will-change:opacity,transform;
}
.ll.in{opacity:1;transform:translateY(0);}
.ll.out{opacity:0;transform:translateY(-10px);transition:opacity .8s ease,transform .8s ease;}

.ll.gold{color:var(--amber);}
.ll.rose{color:#f0b8b8;}
.ll.blue{color:#aad4eb;}
.ll.dim{color:rgba(245,237,224,.45);}
.ll.cream{color:var(--cream);}

.ll.hero{font-size:clamp(3.2rem,8vw,7.5rem);font-weight:500;line-height:1;letter-spacing:-.01em;}
.ll.big{font-size:clamp(2.2rem,5.2vw,5.2rem);font-weight:400;line-height:1.1;}
.ll.med{font-size:clamp(1.4rem,2.8vw,2.6rem);}
.ll.sm{font-size:clamp(.95rem,1.7vw,1.5rem);font-style:normal;font-family:var(--fb);font-weight:200;letter-spacing:.06em;}
.ll.xs{font-size:clamp(.7rem,1vw,.95rem);font-style:normal;font-family:var(--fb);font-weight:200;letter-spacing:.32em;text-transform:uppercase;}

.ll.upright{font-style:normal;}
.ll.tight{line-height:1.05;}
.ll.loose{line-height:1.75;}
.ll.wide{letter-spacing:.07em;}

.d0{transition-delay:.08s}
.d1{transition-delay:.35s}
.d2{transition-delay:.9s}
.d3{transition-delay:1.5s}
.d4{transition-delay:2.1s}
.d5{transition-delay:2.7s}

/* CHAPTER */
.chapter{position:absolute;top:30px;left:50%;transform:translateX(-50%);z-index:11;
  display:flex;align-items:center;gap:12px;
  font-weight:200;font-size:8px;letter-spacing:.5em;text-transform:uppercase;
  color:rgba(232,169,106,.0);transition:color 2s ease 1.2s;}
.slide.active .chapter{color:rgba(232,169,106,.4);}
.chapter-line{width:24px;height:1px;background:currentColor;}

/* SCENE NUMBER */
.scene-n{position:absolute;top:28px;right:7%;z-index:11;
  font-family:var(--ph);font-style:italic;font-size:clamp(4rem,6.5vw,6rem);font-weight:400;
  color:rgba(245,237,224,.03);line-height:1;user-select:none;}

/* END CARD */
#ec{position:fixed;inset:0;z-index:4500;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--ink);opacity:0;pointer-events:none;transition:opacity 3s ease;}
#ec.on{opacity:1;pointer-events:all;}

.ec-inner{text-align:center;padding:0 32px;position:relative;}

.ec-petals{display:flex;justify-content:center;gap:4px;margin-bottom:2.5rem;opacity:0;}
#ec.on .ec-petals{animation:fadeIn 1s .4s forwards;}
.ec-petal{width:1px;height:24px;background:linear-gradient(to bottom,transparent,rgba(232,169,106,.3),transparent);transform:rotate(0deg);}
.ec-petal:nth-child(1){transform:rotate(-25deg);}
.ec-petal:nth-child(2){transform:rotate(-12deg);}
.ec-petal:nth-child(3){height:32px;background:linear-gradient(to bottom,transparent,rgba(232,169,106,.5),transparent);}
.ec-petal:nth-child(4){transform:rotate(12deg);}
.ec-petal:nth-child(5){transform:rotate(25deg);}

.ec-pre{font-weight:200;font-size:9px;letter-spacing:.55em;text-transform:uppercase;color:rgba(232,169,106,.55);opacity:0;}
#ec.on .ec-pre{animation:riseIn 1.4s .6s forwards;}

.ec-name{font-family:var(--ph);font-style:italic;font-weight:400;font-size:clamp(3.5rem,9vw,8.5rem);color:var(--warm);line-height:.95;margin:.6rem 0 .3rem;opacity:0;}
#ec.on .ec-name{animation:riseIn 1.8s 1.1s forwards;}

.ec-year{font-family:var(--ph);font-style:italic;font-weight:400;font-size:clamp(1rem,2.4vw,1.7rem);color:rgba(232,169,106,.7);opacity:0;}
#ec.on .ec-year{animation:riseIn 1.4s 1.7s forwards;}

.ec-ornament{display:flex;align-items:center;justify-content:center;gap:12px;margin:2rem auto;opacity:0;}
#ec.on .ec-ornament{animation:fadeIn .8s 2.4s forwards;}
.ec-ol{width:55px;height:1px;background:linear-gradient(to right,transparent,rgba(232,169,106,.3));}
.ec-or{width:55px;height:1px;background:linear-gradient(to left,transparent,rgba(232,169,106,.3));}
.ec-od{width:4px;height:4px;background:var(--amber);transform:rotate(45deg);}

.ec-msg{font-family:var(--ph);font-style:italic;font-weight:400;font-size:clamp(1rem,2vw,1.6rem);color:rgba(245,237,224,.5);line-height:1.8;max-width:480px;margin:0 auto;opacity:0;}
#ec.on .ec-msg{animation:fadeIn 1.4s 2.8s forwards;}

.rbtn{margin-top:3rem;padding:13px 40px;background:transparent;border:1px solid rgba(232,169,106,.18);color:rgba(232,169,106,.4);font-family:var(--fb);font-weight:200;font-size:9px;letter-spacing:.35em;text-transform:uppercase;cursor:pointer;border-radius:1px;transition:all .5s;opacity:0;}
#ec.on .rbtn{animation:fadeIn .8s 4s forwards;}
.rbtn:hover{border-color:rgba(232,169,106,.5);color:var(--amber);}

/* FLASH */
#flash{position:fixed;inset:0;z-index:3000;background:var(--ink);opacity:0;pointer-events:none;transition:opacity .35s ease;}
#flash.on{opacity:.15;}

/* KEYFRAMES */
@keyframes riseIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* MOBILE */
@media(max-width:640px){
  .pos-bl,.pos-br{left:6%;right:6%;bottom:13%;text-align:center;transform:none;}
  .pos-ml{left:6%;right:6%;text-align:center;transform:translateY(-50%);}
  .pos-tl,.pos-tr{left:6%;right:6%;text-align:center;transform:none;}
  #ctr{right:16px;bottom:18px;}
  #mbars{left:16px;bottom:18px;}
  .scene-n{display:none;}
  .ll.hero{font-size:clamp(2.8rem,12vw,5rem);}
  .ll.big{font-size:clamp(2rem,7.5vw,3.5rem);}
}
</style>
</head>
<body>

<div id="grain"></div>
<div id="vig"></div>
<div id="flash"></div>

<!-- LOADER -->
<div id="loader">
  <div class="ld-petal">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <span class="ld-txt">One moment</span>
</div>

<!-- INTRO -->
<div id="intro">
  <span class="i-small">A little something — made just for you</span>
  <h1 class="i-title">
    <span class="for-word">for</span>
    Her
  </h1>
  <div class="i-ornament">
    <div class="i-orn-l"></div>
    <div class="i-orn-c">
      <div class="i-dot"></div>
      <div class="i-dot big"></div>
      <div class="i-dot"></div>
    </div>
    <div class="i-orn-r"></div>
  </div>
  <p class="i-sub">Turn the volume up &nbsp;·&nbsp; Press play</p>
  <button class="pbtn" id="playBtn">
    <span class="pbtn-icon"></span>
    Begin
  </button>
</div>

<!-- PROGRESS -->
<div id="pw"><div id="pb"></div></div>

<!-- COUNTER -->
<div id="ctr"></div>

<!-- MUSIC BARS -->
<div id="mbars">
  <div class="mb"></div><div class="mb"></div><div class="mb"></div>
  <div class="mb"></div><div class="mb"></div>
</div>

<!-- STAGE -->
<div id="stage"></div>

<!-- END CARD -->
<div id="ec">
  <div class="ec-inner">
    <div class="ec-petals">
      <div class="ec-petal"></div>
      <div class="ec-petal"></div>
      <div class="ec-petal"></div>
      <div class="ec-petal"></div>
      <div class="ec-petal"></div>
    </div>
    <p class="ec-pre" id="ec-pre">With love, always</p>
    <p class="ec-name" id="ec-name">Happy Birthday.</p>
    <p class="ec-year" id="ec-year">You deserve the whole world.</p>
    <div class="ec-ornament">
      <div class="ec-ol"></div>
      <div class="ec-od"></div>
      <div class="ec-or"></div>
    </div>
    <p class="ec-msg" id="ec-msg">Every song, every frame —<br>made only for you.</p>
    <button class="rbtn" id="replayBtn">Watch Again</button>
  </div>
</div>

<!-- HIDDEN YT -->
<div id="ytc" style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden;pointer-events:none;"></div>

<script>

  {

const DEFAULT_END = {
  pre:   "With love, always",
  title: "Happy Birthday.",
  year:  "You deserve the whole world.",
  msg:   "Every song, every frame —\nmade only for you."
};

/* STATE */
let SONGS = [...DEFAULT_SONGS];
let SLIDES = DEFAULT_SLIDES;
let cur = -1, stTimer = null, running = false, activeSng = -1;
let players = {}, plReady = {}, plPending = -1;

const $stage  = document.getElementById('stage');
const $pb     = document.getElementById('pb');
const $pw     = document.getElementById('pw');
const $ctr    = document.getElementById('ctr');
const $mbars  = document.getElementById('mbars');
const $intro  = document.getElementById('intro');
const $ec     = document.getElementById('ec');
const $loader = document.getElementById('loader');
const $flash  = document.getElementById('flash');

/* LOAD DATA */
async function loadData() {
  let data = null;
  try { const s = localStorage.getItem('forHerAdmin'); if (s) data = JSON.parse(s); } catch {}
  if (!data) { try { const r = await fetch('content.json?'+Date.now()); if (r.ok) data = await r.json(); } catch {} }
  if (!data) return;
  if (data.songs && data.songs.length) SONGS = data.songs;
  if (data.slides && data.slides.length) SLIDES = normaliseSlides(data.slides);
  const ec = data.endCard || {};
  setTxt('ec-pre',  ec.pre   || DEFAULT_END.pre);
  setTxt('ec-name', ec.title || DEFAULT_END.title);
  setTxt('ec-year', ec.year  || ec.sub || DEFAULT_END.year);
  setTxt('ec-msg',  ec.msg   || DEFAULT_END.msg);
}

function normaliseSlides(raw) {
  const kbMap = {'zoom-in':'kb-zi','zoom-out':'kb-zo','pan-right':'kb-pr','pan-left':'kb-pl','drift-up':'kb-du','drift-down':'kb-dr'};
  return raw.map(s => ({
    img:    s.img || s.image || '',
    sovl:   s.sovl || 'linear-gradient(to top,rgba(8,6,16,.9) 0%,rgba(8,6,16,.1) 65%,transparent 100%)',
    tint:   s.tint || s.overlay || 'rgba(0,0,0,0.26)',
    kb:     kbMap[s.kenBurns] || s.kb || 'kb-zi',
    pos:    s.pos || 'pos-bc',
    song:   typeof s.song === 'number' ? s.song : 0,
    dur:    s.dur || (s.duration ? s.duration*1000 : 9000),
    chapter:s.chapter || '',
    lines:  (s.lines||[]).map(ln => {
      if (ln.cls !== undefined) return ln;
      const p = [];
      if (ln.delay) p.push(`d${ln.delay}`);
      if (ln.color) p.push(ln.color);
      if (ln.size)  p.push(ln.size);
      if (ln.style) p.push(ln.style);
      return { text: ln.text||'', cls: p.join(' ') };
    })
  }));
}

function setTxt(id, txt) {
  const el = document.getElementById(id);
  if (el) el.textContent = txt;
}

/* BUILD SLIDES */
function buildSlides() {
  $stage.innerHTML = '';
  SLIDES.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'slide';
    d.id = `sl-${i}`;
    const ch = s.chapter ? `<div class="chapter"><div class="chapter-line"></div>${s.chapter}<div class="chapter-line"></div></div>` : '';
    d.innerHTML = `
      <div class="sbg ${s.kb}" style="background-image:url('${cssEsc(s.img)}')"></div>
      <div class="sovl" style="background:${cssEsc(s.sovl)}"></div>
      <div class="stint" style="background:${cssEsc(s.tint)}"></div>
      <div class="sbar-t"></div><div class="sbar-b"></div>
      <div class="sbar-l"></div><div class="sbar-r"></div>
      ${ch}
      <div class="scene-n">${String(i+1).padStart(2,'0')}</div>
      <div class="lw ${s.pos}">
        ${(s.lines||[]).map(l=>`<span class="ll ${l.cls||''}">${escHtml(l.text)}</span>`).join('')}
      </div>`;
    $stage.appendChild(d);
  });
}

/* YOUTUBE */
function loadYT() {
  const t = document.createElement('script');
  t.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(t);
}

window.onYouTubeIframeAPIReady = function() {
  SONGS.forEach((song, i) => {
    const wrap = document.createElement('div');
    wrap.id = `yt-wrap-${i}`;
    wrap.style.cssText = 'position:fixed;top:-200px;left:-200px;width:160px;height:90px;opacity:0;pointer-events:none;';
    document.body.appendChild(wrap);
    players[i] = new YT.Player(`yt-wrap-${i}`, {
      width:'160', height:'90', videoId: song.ytId,
      playerVars:{ autoplay:1, mute:1, start:song.start||0, controls:0, disablekb:1, fs:0, modestbranding:1, rel:0, playsinline:1, enablejsapi:1 },
      events:{
        onReady: e => onReady(e, i),
        onStateChange: e => onStateChange(e, i),
        onError: e => console.warn(`YT err ${i}:`, e.data)
      }
    });
  });
};

function onReady(event, idx) {
  plReady[idx] = true;
  try { event.target.pauseVideo(); event.target.setVolume(0); } catch {}
  if (plPending === idx && running) doPlaySong(idx);
}

function onStateChange(event, idx) {
  if (event.data === YT.PlayerState.ENDED) {
    try { event.target.seekTo(SONGS[idx].start||0,true); event.target.playVideo(); } catch {}
  }
}

function doPlaySong(idx) {
  if (!plReady[idx] || !players[idx]) return;
  try {
    const p = players[idx];
    p.unMute();
    p.seekTo(SONGS[idx].start||0, true);
    p.playVideo();
    smoothVol(p, 0, 80, 3000);
  } catch(e) { console.warn('doPlaySong', e); }
}

function switchSong(idx) {
  if (idx === activeSng) return;
  activeSng = idx;
  SONGS.forEach((_, i) => {
    if (i !== idx && players[i] && plReady[i]) {
      smoothVol(players[i], null, 0, 1400, () => { try { players[i].pauseVideo(); } catch {} });
    }
  });
  plPending = idx;
  if (plReady[idx]) doPlaySong(idx);
}

function smoothVol(player, from, to, ms, cb) {
  let vol = from;
  if (vol === null) { try { vol = player.getVolume(); } catch { vol = to > 0 ? 0 : 80; } }
  const STEPS = 28, ivms = ms/STEPS, delta = (to-vol)/STEPS;
  let n = 0;
  try { player.unMute(); } catch {}
  const iv = setInterval(() => {
    n++; vol = Math.max(0, Math.min(100, vol+delta));
    try { player.setVolume(Math.round(vol)); } catch {}
    if (n >= STEPS) { clearInterval(iv); try { player.setVolume(to); } catch {}; if (cb) cb(); }
  }, ivms);
}

/* SLIDE ENGINE */
function goSlide(idx) {
  if (idx >= SLIDES.length) { showEnd(); return; }
  const prev = cur;
  cur = idx;

  $flash.classList.add('on');
  setTimeout(() => $flash.classList.remove('on'), 350);

  if (prev >= 0) {
    const pe = document.getElementById(`sl-${prev}`);
    if (pe) {
      pe.querySelectorAll('.ll').forEach(l => { l.classList.remove('in'); l.classList.add('out'); });
      setTimeout(() => pe.classList.remove('active'), 2200);
    }
  }

  const el = document.getElementById(`sl-${idx}`);
  const ob = el.querySelector('.sbg');
  const nb = document.createElement('div');
  nb.className = ob.className;
  nb.style.cssText = ob.style.cssText;
  ob.parentNode.replaceChild(nb, ob);
  el.classList.add('active');

  const lls = el.querySelectorAll('.ll');
  lls.forEach(l => l.classList.remove('out'));
  requestAnimationFrame(() => requestAnimationFrame(() => lls.forEach(l => l.classList.add('in'))));

  const dur = SLIDES[idx].dur;
  $pb.style.transition = 'none';
  $pb.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    $pb.style.transition = `width ${dur/1000}s linear`;
    $pb.style.width = '100%';
  }));

  $ctr.textContent = `${String(idx+1).padStart(2,'0')} / ${String(SLIDES.length).padStart(2,'0')}`;

  const sng = SLIDES[idx].song || 0;
  if (sng !== activeSng) switchSong(sng);

  clearTimeout(stTimer);
  stTimer = setTimeout(() => goSlide(cur+1), dur);
}

/* START / END / REPLAY */
function start() {
  $intro.classList.add('gone');
  [$pw,$ctr,$mbars].forEach(e => e.classList.add('on'));
  running = true;
  if (plReady[0] && players[0]) { doPlaySong(0); activeSng = 0; plPending = 0; }
  else { plPending = 0; activeSng = 0; }
  setTimeout(() => goSlide(0), 1800);
}

function showEnd() {
  running = false;
  $pb.style.width = '100%';
  SONGS.forEach((_,i) => {
    if (players[i] && plReady[i]) {
      smoothVol(players[i], null, 0, 2800, () => { try { players[i].pauseVideo(); } catch {} });
    }
  });
  setTimeout(() => $ec.classList.add('on'), 2400);
}

function replay() {
  $ec.classList.remove('on');
  cur = -1; activeSng = -1; plPending = -1;
  document.querySelectorAll('.slide').forEach(s => {
    s.classList.remove('active');
    s.querySelectorAll('.ll').forEach(l => l.classList.remove('in','out'));
  });
  running = true;
  if (plReady[0] && players[0]) { doPlaySong(0); activeSng = 0; plPending = 0; }
  else { plPending = 0; activeSng = 0; }
  setTimeout(() => goSlide(0), 900);
}

/* KEYBOARD */
document.addEventListener('keydown', e => {
  if (!running) return;
  if (e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); clearTimeout(stTimer); goSlide(cur+1); }
  if (e.key==='ArrowLeft') { e.preventDefault(); clearTimeout(stTimer); goSlide(Math.max(0,cur-1)); }
});

/* STORAGE SYNC */
window.addEventListener('storage', async e => {
  if (e.key === 'forHerAdmin') {
    await loadData(); buildSlides();
    cur=-1; activeSng=-1; plPending=-1; running=false;
    $ec.classList.remove('on'); $intro.classList.remove('gone');
    [$pw,$ctr,$mbars].forEach(el => el.classList.remove('on'));
  }
});

/* HELPERS */
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function cssEsc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

/* INIT */
