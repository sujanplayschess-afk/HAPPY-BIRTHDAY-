<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>For Her — A Music Video</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

<!-- ORIGINAL FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,300;1,400&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet"/>

<!-- ✨ NEW HANDWRITTEN FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="style.css"/>
</head>

<body>

<div id="grain"></div>
<div id="vig"></div>

<!-- INTRO -->
<div id="intro">
  <span class="i-pre" id="intro-pre">A story in music & light</span>
  <h1 class="i-title">For <em>Her</em></h1>
  <div class="i-rule"></div>
  <p class="i-sub" id="intro-sub">Kasoor · Baarishein</p>
  <button class="pbtn" id="playBtn">Play</button>
</div>

<!-- PROGRESS -->
<div id="pw"><div id="pb"></div></div>

<div id="slbl"></div>
<div id="ctr"></div>

<div id="mbars">
  <div class="mb"></div><div class="mb"></div><div class="mb"></div>
  <div class="mb"></div><div class="mb"></div>
</div>

<div id="stage"></div>

<!-- END -->
<div id="ec">
  <span class="e-pre" id="ec-pre">With everything</span>
  <p class="e-msg" id="ec-msg">Happy Birthday.</p>
  <p class="e-sub" id="ec-sub">Always yours to keep.</p>
  <div class="e-rule"></div>
  <p class="e-note" id="ec-note"></p>
  <button class="rbtn" id="replayBtn">Watch Again</button>
</div>

<div id="ytc"></div>

<script src="app.js"></script>
</body>
</html>
