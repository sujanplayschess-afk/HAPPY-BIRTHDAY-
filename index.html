<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Her Story — A Cinematic Biography</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="theme-color" content="#050507" />
</head>
<body>

  <!-- ========================================
       INTRO SCREEN
       ======================================== -->
  <div id="intro-screen">
    <span class="intro-eyebrow">A story in six chapters</span>
    <h1 class="intro-title">Her Story</h1>
    <p class="intro-sub">A cinematic biography</p>
    <div class="intro-divider"></div>
    <button class="play-btn" id="play-btn">
      <span class="play-icon"></span>
      Begin
    </button>
  </div>

  <!-- ========================================
       PROGRESS BAR
       ======================================== -->
  <div id="progress-bar-wrap">
    <div id="progress-bar"></div>
  </div>

  <!-- ========================================
       SCENE COUNTER
       ======================================== -->
  <div id="scene-counter"></div>

  <!-- ========================================
       AUDIO INDICATOR
       ======================================== -->
  <div id="audio-indicator">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>

  <!-- ========================================
       STAGE — scenes injected here by JS
       ======================================== -->
  <div id="stage"></div>

  <!-- ========================================
       END CARD
       ======================================== -->
  <div id="end-card">
    <p class="end-message">Happy Birthday.</p>
    <div class="end-gold-line"></div>
    <p class="end-name">with love, always</p>
    <button class="replay-btn" id="replay-btn">Watch Again</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
