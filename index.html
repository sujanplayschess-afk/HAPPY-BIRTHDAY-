<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For Her — A Love Letter</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,300;1,400;1,500&family=DM+Sans:wght@200;300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#06050e;--warm:#f5ede0;--amber:#e8a96a;--rose:#d4898a;--blue:#7aafd4;
  --cream:#fdf6ec;--parchment:#f0e6d0;--sepia:#8b6340;
  --fh:'Playfair Display',serif;--fc:'Cormorant Garamond',serif;--fb:'DM Sans',sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);font-family:var(--fb);color:var(--warm);user-select:none;}

/* ── GRAIN ─────────────────────────────── */
#grain{position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.042;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:160px;animation:grn .5s steps(3) infinite;}
@keyframes grn{0%{transform:translate(0,0)}33%{transform:translate(-3%,2%)}66%{transform:translate(2%,-3%)}100%{transform:translate(-1%,1%)}}

/* ── VIGNETTE ──────────────────────────── */
#vig{position:fixed;inset:0;z-index:9998;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 38%,rgba(6,5,14,.75) 100%);}

/* ── LOADER ────────────────────────────── */
#loader{position:fixed;inset:0;z-index:8000;background:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;transition:opacity 1s ease,visibility 1s ease;}
#loader.gone{opacity:0;visibility:hidden;pointer-events:none;}
.loader-text{font-family:var(--fc);font-style:italic;font-size:14px;
  letter-spacing:.2em;color:rgba(232,169,106,.4);}
.loader-dots{display:flex;gap:8px;}
.ld{width:4px;height:4px;border-radius:50%;background:var(--amber);
  animation:ldp 1.4s ease-in-out infinite;}
.ld:nth-child(2){animation-delay:.2s}.ld:nth-child(3){animation-delay:.4s}
@keyframes ldp{0%,80%,100%{transform:scale(.3);opacity:.3}40%{transform:scale(1);opacity:1}}

/* ── INTRO ─────────────────────────────── */
#intro{position:fixed;inset:0;z-index:5000;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:var(--ink);
  transition:opacity 2.2s ease,visibility 2.2s ease;}
#intro.gone{opacity:0;visibility:hidden;pointer-events:none;}

.i-ornament{font-size:22px;color:rgba(232,169,106,.35);letter-spacing:.5em;
  opacity:0;animation:riseIn 1s .2s forwards;}
.i-pre{font-family:var(--fb);font-weight:200;font-size:clamp(9px,1vw,11px);
  letter-spacing:.45em;text-transform:uppercase;color:var(--amber);
  opacity:0;animation:riseIn 1s .5s forwards;margin-top:16px;}
.i-title{font-family:var(--fc);font-style:italic;font-weight:300;
  font-size:clamp(4rem,9vw,8rem);color:var(--warm);line-height:1;
  text-align:center;opacity:0;animation:riseIn 1.3s .9s forwards;margin-top:8px;}
.i-title em{color:var(--amber);font-style:italic;}
.i-flourish{display:flex;align-items:center;gap:16px;margin:20px 0;
  opacity:0;animation:fadeIn .8s 1.8s forwards;}
.i-line{height:1px;width:60px;background:linear-gradient(to right,transparent,var(--amber));}
.i-line.r{background:linear-gradient(to left,transparent,var(--amber));}
.i-diamond{width:5px;height:5px;background:var(--amber);transform:rotate(45deg);}
.i-sub{font-family:var(--fc);font-style:italic;font-weight:300;
  font-size:clamp(11px,1.3vw,14px);letter-spacing:.12em;
  color:rgba(245,237,224,.4);opacity:0;animation:fadeIn .8s 2s forwards;margin-bottom:32px;}
.pbtn{display:flex;align-items:center;gap:14px;padding:14px 40px;
  border:1px solid rgba(232,169,106,.3);background:rgba(232,169,106,.04);
  backdrop-filter:blur(12px);border-radius:1px;cursor:pointer;color:var(--amber);
  font-family:var(--fb);font-weight:300;font-size:11px;letter-spacing:.3em;
  text-transform:uppercase;opacity:0;animation:fadeIn .8s 2.4s forwards;
  transition:all .5s ease;position:relative;overflow:hidden;}
.pbtn::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(232,169,106,.08),transparent);
  opacity:0;transition:opacity .4s;}
.pbtn:hover::before{opacity:1;}
.pbtn:hover{border-color:rgba(232,169,106,.6);letter-spacing:.36em;}
.ptri{width:0;height:0;border-top:5px solid transparent;
  border-bottom:5px solid transparent;border-left:9px solid var(--amber);flex-shrink:0;}

/* ── PROGRESS ──────────────────────────── */
#pw{position:fixed;top:0;left:0;right:0;z-index:4000;height:1px;
  background:rgba(245,237,224,.04);opacity:0;transition:opacity 1s .5s;}
#pw.on{opacity:1;}
#pb{height:100%;width:0%;
  background:linear-gradient(to right,var(--rose),var(--amber),var(--rose));
  box-shadow:0 0 12px rgba(232,169,106,.6);transition:width .3s linear;}

/* ── HUD ───────────────────────────────── */
#slbl{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:4000;
  font-family:var(--fc);font-style:italic;font-size:11px;letter-spacing:.2em;
  color:rgba(232,169,106,.45);opacity:0;transition:opacity .6s;white-space:nowrap;}
#slbl.on{opacity:1;}
#ctr{position:fixed;bottom:28px;right:30px;z-index:4000;font-family:var(--fb);
  font-weight:200;font-size:10px;letter-spacing:.22em;
  color:rgba(245,237,224,.18);opacity:0;transition:opacity 1s;}
#ctr.on{opacity:1;}
#mbars{position:fixed;bottom:28px;left:30px;z-index:4000;display:flex;
  align-items:flex-end;gap:3px;height:18px;opacity:0;transition:opacity .8s;}
#mbars.on{opacity:1;}
.mb{width:2px;border-radius:2px;background:rgba(232,169,106,.45);
  animation:mba 1s ease-in-out infinite alternate;}
.mb:nth-child(1){height:5px;animation-duration:.9s}
.mb:nth-child(2){height:14px;animation-duration:1.1s;animation-delay:.15s}
.mb:nth-child(3){height:9px;animation-duration:.8s;animation-delay:.3s}
.mb:nth-child(4){height:16px;animation-duration:1.2s;animation-delay:.1s}
.mb:nth-child(5){height:7px;animation-duration:.95s;animation-delay:.25s}
@keyframes mba{from{transform:scaleY(.2)}to{transform:scaleY(1)}}

/* ── STAGE ─────────────────────────────── */
#stage{position:fixed;inset:0;z-index:1;}
.slide{position:absolute;inset:0;opacity:0;
  transition:opacity 1.8s cubic-bezier(.4,0,.2,1);will-change:opacity;}
.slide.active{opacity:1;}
.sbg{position:absolute;inset:-10%;background-size:cover;
  background-position:center;will-change:transform;filter:sepia(.15) brightness(.88);}
.kb-zi{animation:kbZI 22s ease-out forwards;}
.kb-zo{animation:kbZO 22s ease-out forwards;}
.kb-pr{animation:kbPR 22s ease-out forwards;}
.kb-pl{animation:kbPL 22s ease-out forwards;}
.kb-du{animation:kbDU 22s ease-out forwards;}
@keyframes kbZI{from{transform:scale(1)}to{transform:scale(1.13)}}
@keyframes kbZO{from{transform:scale(1.13)}to{transform:scale(1)}}
@keyframes kbPR{from{transform:scale(1.09) translateX(-4%)}to{transform:scale(1.09) translateX(4%)}}
@keyframes kbPL{from{transform:scale(1.09) translateX(4%)}to{transform:scale(1.09) translateX(-4%)}}
@keyframes kbDU{from{transform:scale(1.07) translateY(-3%)}to{transform:scale(1.07) translateY(3%)}}

/* Cinematic overlays */
.sovl{position:absolute;inset:0;
  background:linear-gradient(170deg,rgba(6,5,14,.08) 0%,rgba(6,5,14,.02) 35%,rgba(6,5,14,.72) 100%);}
.stint{position:absolute;inset:0;mix-blend-mode:multiply;}

/* ── VINTAGE LETTER CARD ────────────────── */
.letter-card{
  position:absolute;z-index:10;
  background:linear-gradient(145deg,rgba(253,246,236,.09),rgba(240,230,208,.06));
  border:1px solid rgba(232,169,106,.18);
  backdrop-filter:blur(2px);
  padding:28px 36px 32px;
  border-radius:2px;
  max-width:min(580px,86vw);
  box-shadow:0 8px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(232,169,106,.12);
}
/* Corner ornaments */
.letter-card::before,.letter-card::after{
  content:'✦';font-size:8px;color:rgba(232,169,106,.35);
  position:absolute;line-height:1;}
.letter-card::before{top:8px;left:10px;}
.letter-card::after{bottom:8px;right:10px;}

/* Position classes */
.pos-bl{bottom:9%;left:5%;}
.pos-bc{bottom:9%;left:50%;transform:translateX(-50%);}
.pos-br{bottom:9%;right:5%;}
.pos-ml{top:50%;left:5%;transform:translateY(-50%);}
.pos-mc{top:50%;left:50%;transform:translate(-50%,-50%);}
.pos-tl{top:12%;left:5%;}
.pos-tc{top:12%;left:50%;transform:translateX(-50%);}
.pos-tr{top:12%;right:5%;}

/* Letter header decoration */
.letter-deco{display:flex;align-items:center;gap:10px;margin-bottom:14px;opacity:.5;}
.letter-deco-line{flex:1;height:1px;background:linear-gradient(to right,transparent,var(--amber));}
.letter-deco-line.r{background:linear-gradient(to left,transparent,var(--amber));}
.letter-deco-symbol{font-size:10px;color:var(--amber);letter-spacing:.1em;}

/* Lyric lines */
.ll{display:block;font-family:var(--fc);font-style:italic;font-weight:300;
  font-size:clamp(1.3rem,2.8vw,2.4rem);line-height:1.5;color:var(--cream);
  text-shadow:0 2px 20px rgba(0,0,0,.6);
  opacity:0;transform:translateY(14px);
  transition:opacity 1.2s ease,transform 1.2s ease;}
.ll.in{opacity:1;transform:translateY(0);}
.ll.out{opacity:0;transform:translateY(-8px);
  transition:opacity .7s ease,transform .7s ease;}
.ll.gold{color:var(--amber);}
.ll.rose{color:#ebb0b0;}
.ll.blue{color:#acd0e8;}
.ll.big{font-size:clamp(1.9rem,4.5vw,3.8rem);font-weight:400;}
.ll.sm{font-size:clamp(.85rem,1.6vw,1.2rem);font-style:normal;
  font-family:var(--fb);font-weight:200;letter-spacing:.07em;}
.ll.caps{font-style:normal;letter-spacing:.32em;
  font-size:clamp(.65rem,.95vw,.88rem);font-family:var(--fb);font-weight:200;}
.ll.serif{font-family:var(--fh);font-weight:400;}

/* Letter footer */
.letter-footer{margin-top:14px;display:flex;align-items:center;gap:8px;opacity:.4;}
.letter-footer-line{flex:1;height:1px;background:rgba(232,169,106,.4);}
.letter-footer-dot{width:3px;height:3px;border-radius:50%;background:var(--amber);}

/* Delay classes */
.d1{transition-delay:.2s}.d2{transition-delay:.65s}
.d3{transition-delay:1.1s}.d4{transition-delay:1.55s}

/* ── END CARD ──────────────────────────── */
#ec{position:fixed;inset:0;z-index:4500;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:var(--ink);
  opacity:0;pointer-events:none;transition:opacity 2.5s ease;}
#ec.on{opacity:1;pointer-events:all;}

.ec-ornament{font-size:18px;color:rgba(232,169,106,.3);letter-spacing:.4em;opacity:0;}
#ec.on .ec-ornament{animation:riseIn 1s .3s forwards;}
.e-pre{font-family:var(--fb);font-weight:200;font-size:10px;letter-spacing:.5em;
  text-transform:uppercase;color:var(--amber);opacity:0;margin-top:12px;}
#ec.on .e-pre{animation:riseIn 1.2s .6s forwards;}
.e-msg{font-family:var(--fc);font-style:italic;
  font-size:clamp(2.8rem,7vw,6.5rem);font-weight:300;color:var(--warm);
  text-align:center;line-height:1.1;margin:.6rem 0 .1rem;opacity:0;}
#ec.on .e-msg{animation:riseIn 1.5s 1s forwards;}
.e-sub{font-family:var(--fc);font-style:italic;font-weight:300;
  font-size:clamp(1rem,2.2vw,1.6rem);color:var(--amber);opacity:0;}
#ec.on .e-sub{animation:riseIn 1.2s 1.8s forwards;}

.e-flourish{display:flex;align-items:center;gap:14px;margin:22px 0;opacity:0;}
#ec.on .e-flourish{animation:fadeIn .8s 2.3s forwards;}
.e-fl-line{height:1px;width:50px;background:linear-gradient(to right,transparent,var(--amber));}
.e-fl-line.r{background:linear-gradient(to left,transparent,var(--amber));}
.e-fl-diamond{width:5px;height:5px;background:var(--amber);transform:rotate(45deg);}

.e-note{font-family:var(--fc);font-style:italic;font-size:12px;letter-spacing:.12em;
  color:rgba(245,237,224,.28);text-align:center;opacity:0;}
#ec.on .e-note{animation:fadeIn .8s 2.6s forwards;}
.rbtn{margin-top:28px;padding:12px 34px;background:transparent;
  border:1px solid rgba(232,169,106,.2);color:rgba(232,169,106,.4);
  font-family:var(--fb);font-weight:200;font-size:10px;letter-spacing:.3em;
  text-transform:uppercase;cursor:pointer;border-radius:1px;transition:all .45s;opacity:0;}
#ec.on .rbtn{animation:fadeIn .8s 3.2s forwards;}
.rbtn:hover{border-color:var(--amber);color:var(--amber);}

/* ── KEYFRAMES ─────────────────────────── */
@keyframes riseIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── MOBILE ────────────────────────────── */
@media(max-width:600px){
  .pos-bl,.pos-br{left:4%;right:4%;bottom:10%;transform:none;}
  .pos-ml{left:4%;right:4%;transform:translateY(-50%);}
  .pos-tl,.pos-tr{left:4%;right:4%;transform:none;}
  .pos-bc{left:4%;right:4%;transform:none;}
  .letter-card{padding:20px 22px 24px;max-width:92vw;}
  #ctr{right:14px;bottom:16px;}#mbars{left:14px;bottom:16px;}
}
</style>
</head>

  ],
  endCard:{
    pre:"With everything",title:"Happy Birthday.",
    sub:"Always yours to keep.",
    note:"Kasoor · Baarishein · Tum Hi Ho · Tera Yaar Hoon Main · Khairiyat"
  }
};

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let SONGS=[],SLIDES=[];
let cur=-1,stTimer=null,running=false,activeSng=-1;

/* Audio */
let audioCtx=null, gainNodes={}, sources={}, audioBuffers={};
let currentSong=-1;

/* YouTube fallback */
let ytPlrs={},ytReady={},ytPending=-1,ytOk=false;
let useYT=false; // true if no local audio uploaded

/* DOM */
const $stage =document.getElementById('stage');
const $pb    =document.getElementById('pb');
const $pw    =document.getElementById('pw');
const $ctr   =document.getElementById('ctr');
const $mbars =document.getElementById('mbars');
const $slbl  =document.getElementById('slbl');
const $intro =document.getElementById('intro');
const $ec    =document.getElementById('ec');
const $loader=document.getElementById('loader');

/* ════════════════════════════════════════
   LOAD DATA
════════════════════════════════════════ */
async function loadData(){
  let data=null;
  try{
    const s=localStorage.getItem('forHerAdmin');
    if(s) data=JSON.parse(s);
  }catch(e){}
  if(!data){
    try{
      const r=await fetch('content.json?'+Date.now());
      if(r.ok) data=await r.json();
    }catch(e){}
  }
  if(!data) data={...DEF};

  SONGS =(data.songs  &&data.songs.length) ?data.songs  :DEF.songs;
  SLIDES=(data.slides &&data.slides.length)?normalise(data.slides):DEF.slides;

  /* Check if any song has a local file src */
  useYT = SONGS.every(s=>!s.src||s.src.startsWith('http'));

  const ec=data.endCard||DEF.endCard;
  const intro=data.intro||DEF.intro;
  setTxt('i-pre-txt',  intro.pre   ||DEF.intro.pre);
  setTxt('i-title-txt',intro.title ||DEF.intro.title);
  setTxt('i-sub-txt',  intro.sub   ||DEF.intro.sub);
  setTxt('play-btn-txt',intro.btnText||DEF.intro.btnText);
  setTxt('ec-pre',  ec.pre  ||DEF.endCard.pre);
  setTxt('ec-msg',  ec.title||DEF.endCard.title);
  setTxt('ec-sub',  ec.sub  ||DEF.endCard.sub);
  setTxt('ec-note', ec.note ||DEF.endCard.note);
}

function normalise(raw){
  const km={'zoom-in':'kb-zi','zoom-out':'kb-zo','pan-right':'kb-pr','pan-left':'kb-pl','drift-up':'kb-du'};
  return raw.map(s=>({
    img  :s.img||s.image||'',
    tint :s.tint||s.overlay||'rgba(0,0,0,0.32)',
    kb   :km[s.kenBurns]||s.kb||'kb-zi',
    pos  :s.pos||'pos-bc',
    song :typeof s.song==='number'?s.song:0,
    dur  :s.dur||(s.duration?s.duration*1000:9000),
    deco :s.deco||'✦',
    lines:(s.lines||[]).map(ln=>{
      if(ln.cls!==undefined)return ln;
      const p=[];
      if(ln.delay)p.push(`d${ln.delay}`);
      if(ln.color)p.push(ln.color);
      if(ln.size) p.push(ln.size);
      if(ln.style)p.push(ln.style);
      return{text:ln.text||'',cls:p.join(' ')};
    })
  }));
}

function setTxt(id,txt){
  const el=document.getElementById(id);
  if(el) el.textContent=txt;
}

/* ════════════════════════════════════════
   BUILD SLIDES
════════════════════════════════════════ */
function buildSlides(){
  $stage.innerHTML='';
  SLIDES.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='slide';d.id=`sl-${i}`;
    d.innerHTML=`
      <div class="sbg ${s.kb}" style="background-image:url('${cssEsc(s.img)}')"></div>
      <div class="sovl"></div>
      <div class="stint" style="background:${cssEsc(s.tint)}"></div>
      <div class="letter-card ${s.pos}">
        <div class="letter-deco">
          <div class="letter-deco-line"></div>
          <div class="letter-deco-symbol">${s.deco||'✦'}</div>
          <div class="letter-deco-line r"></div>
        </div>
        ${(s.lines||[]).map(l=>`<span class="ll ${l.cls||''}">${escHtml(l.text)}</span>`).join('')}
        <div class="letter-footer">
          <div class="letter-footer-line"></div>
          <div class="letter-footer-dot"></div>
          <div class="letter-footer-line"></div>
        </div>
      </div>`;
    $stage.appendChild(d);
  });
}

/* ════════════════════════════════════════
   WEB AUDIO ENGINE (local files)
════════════════════════════════════════ */
function initAudio(){
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  }catch(e){ console.warn('AudioContext failed',e); }
}

async function loadAudioSrc(idx){
  if(!audioCtx||!SONGS[idx]) return null;
  const song=SONGS[idx];
  if(audioBuffers[idx]) return audioBuffers[idx];

  /* Only load data URLs (local files) */
  if(!song.src||!song.src.startsWith('data:')) return null;

  try{
    const res=await fetch(song.src);
    const ab=await res.arrayBuffer();
    const buf=await audioCtx.decodeAudioData(ab);
    audioBuffers[idx]=buf;
    return buf;
  }catch(e){
    console.warn('Audio decode failed',idx,e);
    return null;
  }
}

async function playLocalSong(idx){
  if(!audioCtx) return false;
  const buf=await loadAudioSrc(idx);
  if(!buf) return false;

  /* Stop current */
  stopAllAudio(idx);

  try{
    const src=audioCtx.createBufferSource();
    const gain=audioCtx.createGain();
    const start=SONGS[idx].start||0;
    src.buffer=buf;
    src.loop=true;
    src.loopStart=start;
    src.connect(gain);
    gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0,audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(.85,audioCtx.currentTime+2.5);
    src.start(0,start);
    sources[idx]=src;
    gainNodes[idx]=gain;
    return true;
  }catch(e){
    console.warn('playLocalSong error',e);
    return false;
  }
}

function stopAllAudio(except=-1){
  Object.keys(gainNodes).forEach(i=>{
    const idx=+i;
    if(idx===except) return;
    const g=gainNodes[idx];
    if(g){
      try{
        g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+1.2);
        setTimeout(()=>{
          try{sources[idx].stop();}catch{}
          delete sources[idx];
          delete gainNodes[idx];
        },1300);
      }catch{}
    }
  });
}

function stopAllAudioFinal(){
  Object.keys(gainNodes).forEach(i=>{
    const g=gainNodes[i];
    if(g){
      try{
        g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+2);
        setTimeout(()=>{try{sources[i].stop();}catch{}},2100);
      }catch{}
    }
  });
}

/* ════════════════════════════════════════
   YOUTUBE FALLBACK ENGINE
════════════════════════════════════════ */
function loadYT(){
  const t=document.createElement('script');
  t.src='https://www.youtube.com/iframe_api';
  document.head.appendChild(t);
}

window.onYouTubeIframeAPIReady=function(){
  ytOk=true;
  if(!useYT) return; /* Don't init YT players if we have local audio */
  SONGS.forEach((song,i)=>{
    if(!song.ytId) return;
    const wrap=document.createElement('div');
    wrap.id=`yt-${i}`;
    wrap.style.cssText='position:fixed;top:-200px;left:-200px;width:160px;height:90px;opacity:0;pointer-events:none;';
    document.body.appendChild(wrap);
    ytPlrs[i]=new YT.Player(`yt-${i}`,{
      width:'160',height:'90',videoId:song.ytId,
      playerVars:{autoplay:1,mute:1,start:song.start||0,controls:0,
        disablekb:1,fs:0,modestbranding:1,rel:0,playsinline:1,enablejsapi:1},
      events:{
        onReady:e=>ytOnReady(e,i),
        onStateChange:e=>ytOnState(e,i),
        onError:e=>console.warn('YT err',i,e.data)
      }
    });
  });
};

function ytOnReady(event,idx){
  ytReady[idx]=true;
  try{event.target.pauseVideo();event.target.setVolume(0);}catch{}
  if(ytPending===idx&&running) ytDoPlay(idx);
}

function ytOnState(event,idx){
  if(event.data===YT.PlayerState.ENDED){
    try{event.target.seekTo(SONGS[idx].start||0,true);event.target.playVideo();}catch{}
  }
}

function ytDoPlay(idx){
  if(!ytReady[idx]||!ytPlrs[idx]) return;
  try{
    const p=ytPlrs[idx];
    p.unMute();
    p.seekTo(SONGS[idx].start||0,true);
    p.playVideo();
    ytFadeVol(p,0,82,2200);
  }catch(e){console.warn('ytDoPlay',e);}
}

function ytFadeOut(idx,cb){
  if(!ytReady[idx]||!ytPlrs[idx]){if(cb)cb();return;}
  ytFadeVol(ytPlrs[idx],null,0,1000,()=>{
    try{ytPlrs[idx].pauseVideo();}catch{}
    if(cb)cb();
  });
}

function ytFadeVol(player,from,to,ms,cb){
  let v=from;
  if(v===null){try{v=player.getVolume();}catch{v=to>0?0:82;}}
  const steps=25,interval=ms/steps,delta=(to-v)/steps;
  let n=0;
  try{player.unMute();}catch{}
  const iv=setInterval(()=>{
    n++;v=Math.max(0,Math.min(100,v+delta));
    try{player.setVolume(Math.round(v));}catch{}
    if(n>=steps){clearInterval(iv);try{player.setVolume(to);}catch{}if(cb)cb();}
  },interval);
}

/* ════════════════════════════════════════
   UNIFIED SWITCH SONG
════════════════════════════════════════ */
async function switchSong(idx){
  if(idx===activeSng) return;
  activeSng=idx;

  /* Update label */
  $slbl.classList.remove('on');
  setTimeout(()=>{
    if(SONGS[idx]) $slbl.textContent=SONGS[idx].title;
    $slbl.classList.add('on');
  },400);

  if(!useYT){
    /* ── LOCAL AUDIO ── */
    const ok=await playLocalSong(idx);
    if(!ok){
      /* No local file — try YT if available */
      useYT=true;
      if(ytOk) ytSwitchSong(idx);
    }
  } else {
    /* ── YOUTUBE ── */
    ytSwitchSong(idx);
  }
}

function ytSwitchSong(idx){
  SONGS.forEach((_,i)=>{
    if(i!==idx) ytFadeOut(i);
  });
  ytPending=idx;
  if(ytOk&&ytReady[idx]) ytDoPlay(idx);
}

/* ════════════════════════════════════════
   SLIDE ENGINE
════════════════════════════════════════ */
function goSlide(idx){
  if(idx>=SLIDES.length){showEnd();return;}
  const prev=cur; cur=idx;

  if(prev>=0){
    const pe=document.getElementById(`sl-${prev}`);
    if(pe){
      pe.querySelectorAll('.ll').forEach(l=>{l.classList.remove('in');l.classList.add('out');});
      setTimeout(()=>pe.classList.remove('active'),1800);
    }
  }

  const el=document.getElementById(`sl-${idx}`);
  const ob=el.querySelector('.sbg');
  const nb=document.createElement('div');
  nb.className=ob.className; nb.style.cssText=ob.style.cssText;
  ob.parentNode.replaceChild(nb,ob);
  el.classList.add('active');

  const lls=el.querySelectorAll('.ll');
  lls.forEach(l=>l.classList.remove('out'));
  requestAnimationFrame(()=>requestAnimationFrame(()=>lls.forEach(l=>l.classList.add('in'))));

  const dur=SLIDES[idx].dur;
  $pb.style.transition='none';$pb.style.width='0%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    $pb.style.transition=`width ${dur/1000}s linear`;
    $pb.style.width='100%';
  }));

  $ctr.textContent=`${String(idx+1).padStart(2,'0')} / ${String(SLIDES.length).padStart(2,'0')}`;

  const sng=SLIDES[idx].song||0;
  if(sng!==activeSng) switchSong(sng);

  clearTimeout(stTimer);
  stTimer=setTimeout(()=>goSlide(cur+1),dur);
}

/* ════════════════════════════════════════
   START / END / REPLAY
════════════════════════════════════════ */
async function start(){
  $intro.classList.add('gone');
  [$pw,$ctr,$mbars,$slbl].forEach(e=>e.classList.add('on'));
  running=true;

  if(!useYT){
    /* Resume AudioContext (needed on Safari) */
    if(audioCtx&&audioCtx.state==='suspended') await audioCtx.resume();
    const ok=await playLocalSong(0);
    if(ok){ activeSng=0; }
    else{ useYT=true; ytSwitchSong(0); activeSng=0; }
  } else {
    /* YT: call in same click handler gesture */
    ytPending=0; activeSng=0;
    if(ytOk&&ytReady[0]) ytDoPlay(0);
  }

  setTimeout(()=>goSlide(0),1600);
}

function showEnd(){
  running=false;$pb.style.width='100%';
  if(!useYT) stopAllAudioFinal();
  else SONGS.forEach((_,i)=>{if(ytPlrs[i]&&ytReady[i])ytFadeOut(i);});
  setTimeout(()=>$ec.classList.add('on'),2000);
}

async function replay(){
  $ec.classList.remove('on');
  cur=-1;activeSng=-1;
  document.querySelectorAll('.slide').forEach(s=>{
    s.classList.remove('active');
    s.querySelectorAll('.ll').forEach(l=>l.classList.remove('in','out'));
  });
  running=true;
  if(!useYT){
    if(audioCtx&&audioCtx.state==='suspended') await audioCtx.resume();
    await playLocalSong(0);
    activeSng=0;
  } else {
    ytPending=0;activeSng=0;
    if(ytOk&&ytReady[0]) ytDoPlay(0);
  }
  setTimeout(()=>goSlide(0),800);
}

/* ════════════════════════════════════════
   KEYBOARD
════════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(!running)return;
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();clearTimeout(stTimer);goSlide(cur+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();clearTimeout(stTimer);goSlide(Math.max(0,cur-1));}
});

/* ════════════════════════════════════════
   STORAGE SYNC
════════════════════════════════════════ */
window.addEventListener('storage',async e=>{
  if(e.key==='forHerAdmin'){
    await loadData();buildSlides();
    cur=-1;activeSng=-1;running=false;
    $ec.classList.remove('on');
    $intro.classList.remove('gone');
    [$pw,$ctr,$mbars,$slbl].forEach(el=>el.classList.remove('on'));
  }
});

/* ════════════════════════════════════════
   HELPERS
════════════════════════════════════════ */
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function cssEsc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
async function init(){
  await loadData();
  buildSlides();
  initAudio();
  loadYT();
  $loader.classList.add('gone');
  document.getElementById('playBtn').addEventListener('click',start);
  document.getElementById('replayBtn').addEventListener('click',replay);
}
init();
</script>
